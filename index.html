}

function closeTrash() {
  document.getElementById('trashOverlay').classList.remove('open');
}

function updateTrashBadge() {
  ensureTrash();
  var count = localDb.trash.length;
  var badge = document.getElementById('trash-badge');
  if (badge) badge.textContent = count > 0 ? count + ' öğe' : '';
}

function renderTrash() {
  ensureTrash();
  var container = document.getElementById('trashContent');
  var countEl = document.getElementById('trashCount');
  var emptyBtn = document.getElementById('trashEmptyBtn');
  var trash = localDb.trash;
  var typeColors = { disease:'var(--dis)', finding:'var(--fin)', symptom:'var(--sym)', info:'#b7860b' };
  var typeLabels = { disease:'Hastalık', finding:'Bulgu', symptom:'Belirti', info:'Bilgi Kartı' };

  if (countEl) countEl.textContent = trash.length + ' öğe';
  if (emptyBtn) emptyBtn.style.display = trash.length ? 'block' : 'none';

  if (!trash.length) {
    container.innerHTML = '<div class="empty-state" style="padding:40px 20px;"><div class="ei">🗑</div><h3>Çöp kutusu boş</h3><p>Silinen kartlar burada görünür.</p></div>';
    return;
  }

  // En yeni silinenden eskiye doğru sırala
  var sorted = trash.slice().sort(function(a,b){ return b.deletedAt - a.deletedAt; });

  container.innerHTML = sorted.map(function(item, i) {
    var realIdx = trash.indexOf(item);
    var color = typeColors[item.type] || '#999';
    var label = typeLabels[item.type] || item.type;
    var date = new Date(item.deletedAt);
    var dateStr = date.toLocaleDateString('tr-TR') + ' ' + date.toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'});
    return '<div class="trash-item">' +
      '<span class="trash-item-dot" style="background:' + color + ';"></span>' +
      '<div class="trash-item-info">' +
        '<div class="trash-item-title">' + esc(item.entry.title) + '</div>' +
        '<div class="trash-item-meta">' + label + ' · ' + dateStr + '</div>' +
      '</div>' +
      '<button class="trash-item-restore" onclick="restoreFromTrash(' + realIdx + ')">↩ Geri al</button>' +
      '<button class="trash-item-del" title="Kalıcı sil" onclick="permanentDelete(' + realIdx + ')">&#215;</button>' +
    '</div>';
  }).join('');
}

function restoreFromTrash(idx) {
  ensureTrash();
  var item = localDb.trash[idx];
  if (!item) return;
  if (!localDb[item.type]) localDb[item.type] = [];
  // Aynı id varsa ekleme
  var exists = localDb[item.type].some(function(e){ return e.id === item.entry.id; });
  if (!exists) localDb[item.type].unshift(item.entry);
  localDb.trash.splice(idx, 1);
  scheduleSave();
  if (item.type === 'info') { renderInfoList(); } else { renderList(item.type); }
  renderTrash();
  updateTrashBadge();
  showToast('↩ Geri alındı');
}

function permanentDelete(idx) {
  ensureTrash();
  showConfirm('Bu öğe kalıcı olarak silinecek. Geri alınamaz.', function() {
    localDb.trash.splice(idx, 1);
    scheduleSave();
    renderTrash();
    updateTrashBadge();
    showToast('Kalıcı olarak silindi');
  });
}

function emptyTrash() {
  ensureTrash();
  if (!localDb.trash.length) return;
  showConfirm('Çöp kutusundaki tüm öğeler kalıcı olarak silinecek. Emin misin?', function() {
    localDb.trash = [];
    scheduleSave();
    renderTrash();
    updateTrashBadge();
    showToast('Çöp kutusu boşaltıldı');
  });
}

// ── EXPORT / IMPORT / CLEAR ──
function exportData() {
  const blob = new Blob([JSON.stringify(localDb, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'medlog_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  showToast('📤 Dışa aktarıldı');
  closeSettings();
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imp = JSON.parse(ev.target.result); let added = 0;
      ['disease','finding','symptom','info'].forEach(function(type) {
        if (!Array.isArray(imp[type])) return;
        var ids = new Set(localDb[type].map(function(e){ return e.id; }));
        imp[type].forEach(function(entry){
          if (!entry.id || !/^[a-zA-Z0-9_-]+$/.test(String(entry.id))) return;
          if (typeof entry.title !== 'string' || !entry.title.trim() || entry.title.trim().length > 200) return;
          if (ids.has(entry.id)) return;
          // Sadece bilinen alanları al, ham objeyi kopyalama
          var clean;
          if (type === 'info') {
            var rawItems = Array.isArray(entry.items) ? entry.items : [];
            // Yeni format mı (obje dizisi) yoksa eski format mı (string dizisi)?
            var cleanItems;
            if (rawItems.length && typeof rawItems[0] === 'object' && rawItems[0] !== null) {
              cleanItems = rawItems.filter(function(g){ return g && typeof g === 'object'; }).map(function(g){
                return { baslik: typeof g.baslik === 'string' ? g.baslik.trim() : '', maddeler: Array.isArray(g.maddeler) ? g.maddeler.filter(function(x){ return typeof x === 'string'; }).map(function(x){ return x.trim(); }).filter(Boolean) : [] };
              });
            } else {
              cleanItems = rawItems.length ? [{ baslik: '', maddeler: rawItems.filter(function(x){ return typeof x === 'string'; }).map(function(x){ return x.trim(); }).filter(Boolean) }] : [];
            }
            clean = { id: entry.id, title: entry.title.trim(), items: cleanItems };
          } else {
            clean = { id: entry.id, title: entry.title.trim() };
            FIELDS.forEach(function(f){ clean[f] = Array.isArray(entry[f]) ? entry[f].filter(function(x){ return typeof x === 'string'; }).map(function(x){ return x.trim(); }).filter(Boolean) : []; });
          }
          localDb[type].push(clean);
          added++;
        });
      });
      // Pool merge
      if (imp.pool) {
        ensurePool();
        FIELDS.forEach(function(f) {
          const existing = new Set(localDb.pool[f].map(function(x){ return x.toLowerCase(); }));
          (imp.pool[f]||[]).forEach(function(x){ if(x && !existing.has(x.toLowerCase())){ localDb.pool[f].push(x); existing.add(x.toLowerCase()); } });
        });
      }
      rebuildPoolFromEntries();
      scheduleSave(); renderAll(); closeSettings();
      showToast('✓ ' + added + ' giriş içe aktarıldı');
    } catch(err) { showToast('❌ Geçersiz dosya'); }
  };
  reader.readAsText(file); e.target.value = '';
}

function clearAllData() {
  showConfirm('Tüm veriler silinecek. Bu işlem geri alınamaz. Emin misin?', async function() {
    localDb = emptyDb();
    saveLocal();
    // Firebase belgesini de sil (boş veriyle üzerine yazmak yerine)
    if (currentUser && db) {
      try {
        await userDocRef().delete();
      } catch(e) {
        console.error('Firebase silme hatası:', e);
      }
    }
    renderAll();
    updateTrashBadge();
    closeSettings();
    showToast('🗑 Tüm veriler silindi');
  });
}

var infoModalItems = []; // [{baslik: string, maddeler: string[]}]
var infoEditingId = null;

// Eski format (string[]) → yeni format ({baslik, maddeler}[]) dönüşümü
function migrateInfoItems(items) {
  if (!Array.isArray(items) || !items.length) return [];
  // Zaten yeni formatta mı?
  if (typeof items[0] === 'object' && items[0] !== null) return items;
  // Eski format: string[] → tek bir altbaşlıksız grup
  return [{ baslik: '', maddeler: items.filter(function(x){ return typeof x === 'string'; }) }];
}

function saveInfoModal() {
  var title = document.getElementById('im-title').value.trim();
  if (!title) { showToast('Başlık gir'); document.getElementById('im-title').focus(); return; }
  if (!localDb.info) localDb.info = [];
  var items = saveInfoGrupData();
  if (infoEditingId) {
    var idx = localDb.info.findIndex(function(e){ return e.id === infoEditingId; });
    if (idx > -1) localDb.info[idx] = Object.assign({}, localDb.info[idx], { title:title, items:items });
  } else {
    localDb.info.unshift({ id: crypto.randomUUID(), title:title, items:items });
  }
  scheduleSave();
  closeInfoModal();
  renderInfoList();
  showToast(infoEditingId ? '✓ Güncellendi' : '✓ Eklendi');
}

function deleteInfoEntry(id) {
  showConfirm('Bu kartı çöp kutusuna taşımak istiyor musun?', function() {
    var idx = (localDb.info||[]).findIndex(function(e){ return e.id === id; });
    if (idx === -1) return;
    var entry = localDb.info[idx];
    ensureTrash();
    localDb.trash.push({ type: 'info', entry: entry, deletedAt: Date.now() });
    localDb.info.splice(idx, 1);
    scheduleSave(); renderInfoList();
    showToast('🗑 Çöp kutusuna taşındı');
  });
}

function deleteInfoItem(entryId, gi, mi) {
  var entry = (localDb.info||[]).find(function(e){ return e.id === entryId; });
  if (!entry) return;
  var grups = migrateInfoItems(entry.items || []);
  if (!grups[gi]) return;
  grups[gi].maddeler.splice(mi, 1);
  // Altbaşlıksız ve boş grup ise kaldır
  if (!grups[gi].baslik && !grups[gi].maddeler.length) grups.splice(gi, 1);
  entry.items = grups;
  scheduleSave(); renderInfoList();
}

}

function infoCardHTML(entry) {
  var safeId = esc(entry.id);
  var wasOpen = (function(){ var c = document.getElementById('icard-' + entry.id); return c && c.classList.contains('open'); })();
  var grups = migrateInfoItems(entry.items || []);

  var itemsHtml = grups.map(function(grup, gi) {
    if (!grup.maddeler.length && !grup.baslik) return '';
    var baslikHTML = grup.baslik
      ? '<div style="font-size:13px;font-weight:700;color:#b7860b;padding:8px 16px 3px 16px;">' + esc(grup.baslik) + '</div>'
      : '';
    var maddeHTML = grup.maddeler.map(function(item, mi) {
      var indent = grup.baslik ? '32px' : '16px';
      return '<div class="info-body-item" style="padding-left:' + indent + '">' +
        '<span class="info-body-dot"></span>' +
        '<span class="info-body-text">' + esc(item) + '</span>' +
        '<button class="info-body-del" onclick="deleteInfoItem(\'' + safeId + '\',' + gi + ',' + mi + ')">&#215;</button>' +
        '</div>';
    }).join('');
    return baslikHTML + maddeHTML;

    '<div class="entry-header" onclick="toggleInfoCard(\'' + safeId + '\')">' +
      '<span class="e-dot" style="background:#b7860b"></span>' +
      '<span class="e-title">' + esc(entry.title) + '</span>' +
      '<button class="e-del" onclick="event.stopPropagation();openInfoModal(\'' + safeId + '\')" title="Düzenle">✏️</button>' +
      '<button class="e-del" onclick="event.stopPropagation();deleteInfoEntry(\'' + safeId + '\')" title="Sil">🗑</button>' +
      '<span class="chevron">▾</span>' +
    '</div>' +
    '<div class="entry-body"><div>' + itemsHtml + '</div></div>' +
    '</div>';

function renderInfoList() {
  if (!localDb.info) localDb.info = [];
  var container = document.getElementById('list-info');
  var entries = localDb.info;
  var statsEl = document.getElementById('stats-info');
  if (statsEl) statsEl.innerHTML = '<strong>' + entries.length + '</strong> giriş · <strong>' + entries.reduce(function(a,e){
    var grups = migrateInfoItems(e.items||[]);
    return a + grups.reduce(function(b,g){ return b+(g.maddeler||[]).length; }, 0);
  },0) + '</strong> madde';
  if (!entries.length) {
    container.innerHTML = '<div class="empty-state"><div class="ei">📋</div><h3>Henüz bilgi kartı eklenmedi</h3><p>Yukarıdaki butona tıklayarak ilk kartını ekle.</p></div>';

  container.innerHTML = entries.map(infoCardHTML).join('');

function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hl(text, q) {
  var e = esc(text);
  var qe = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return e.replace(new RegExp(qe,'gi'), function(m){ return '<mark>' + m + '</mark>'; });
}

// ── PULL TO REFRESH ──
(function(){
  var PTR_THRESHOLD = 72;
  var startY = 0, lastY = 0, pulling = false, refreshing = false;
  var ind = document.getElementById('ptr-indicator');
  var spinner = document.getElementById('ptr-spinner');
  var label = document.getElementById('ptr-label');

  // Sadece sayfanın en üstündeyken ve refresh yokken başlat
  document.addEventListener('touchstart', function(e){
    if (refreshing || window.scrollY > 0) return;
    startY = e.touches[0].clientY;
    lastY = startY;
    pulling = false; // henüz yönü bilmiyoruz
  }, { passive: true });

  document.addEventListener('touchmove', function(e){
    if (refreshing) return;
    var y = e.touches[0].clientY;
    var dist = y - startY;

    // Yukarı kaydırıyorsa PTR'yi iptal et
    if (dist <= 0) {
      if (pulling) reset();
      pulling = false;
      lastY = y;
      return;
    }

    // Sayfa scroll pozisyonu 0'dan ayrıldıysa iptal et
    if (window.scrollY > 0) {
      if (pulling) reset();
      pulling = false;
      lastY = y;
      return;
    }

    pulling = true;
    lastY = y;

    // Rubber-band damping
    var pull = Math.min(dist * 0.45, PTR_THRESHOLD * 1.15);
    var ratio = Math.min(pull / PTR_THRESHOLD, 1);

    ind.style.height = pull + 'px';
    ind.style.opacity = '1';
    ind.classList.add('pulling');
    ind.classList.remove('refreshing');
    spinner.style.transform = 'rotate(' + (ratio * 260) + 'deg)';

    if (ratio >= 1) {
      ind.classList.add('ready');
      label.textContent = 'Bırak, yenile';
    } else {
      ind.classList.remove('ready');
      label.textContent = 'Yenilemek için çek…';
    }
  }, { passive: true });

  document.addEventListener('touchend', function(){
    if (!pulling) return;
    pulling = false;

    var dist = lastY - startY;
    var pull = dist * 0.45;

    if (pull >= PTR_THRESHOLD) {
      doRefresh();
    } else {
      reset();
    }
  });

  document.addEventListener('touchcancel', function(){
    if (pulling) reset();
    pulling = false;
  });

  function doRefresh() {
    refreshing = true;
    // Inline height'ı temizle, .refreshing class'ı CSS'teki 52px'i devreye sokar
    ind.style.height = '';
    ind.style.opacity = '';
    ind.classList.remove('pulling', 'ready');
    ind.classList.add('refreshing');
    label.textContent = 'Yenileniyor…';
    spinner.style.transform = '';

    function done() {
      refreshing = false;
      ind.classList.remove('refreshing', 'pulling', 'ready');
      // Geçişi CSS transition ile yap — inline style ile çakışma olmasın
      ind.style.opacity = '0';
      setTimeout(function(){
        ind.style.height = '0';
        setTimeout(function(){
          ind.style.height = '';
          ind.style.opacity = '';
        }, 250);
      }, 150);
      rebuildPoolFromEntries();
      renderAll();
      showToast('✓ Yenilendi');
    }

    if (currentUser && db) {
      syncFromFirebase().then(done).catch(function(e){
        console.error('Pull-to-refresh sync hatası:', e);
        showToast('⚠️ Senkronizasyon başarısız');
        done();
      });
    } else {
      setTimeout(done, 600);
    }
  }

  function reset() {
    ind.classList.remove('pulling', 'ready', 'refreshing');
    ind.style.opacity = '0';
    setTimeout(function(){
      ind.style.height = '';
      ind.style.opacity = '';
    }, 200);
  }
})();

  renderStats();
  var sb = document.getElementById('statsBody');
  if (sb) sb.style.display = sb.style.display === 'none' ? 'block' : 'none';
}
function renderStats() {
  var dis = localDb.disease || [];
  var fin = localDb.finding || [];
  var sym = localDb.symptom || [];
  var inf = localDb.info || [];

  var countItems = function(arr, fields) {
    return arr.reduce(function(s, e) {
      return s + fields.reduce(function(fs, f) {
        if (f === 'tedavi') {
          return fs + migrateTedavi(e.tedavi).reduce(function(ts, g){ return ts + (g.maddeler||[]).length; }, 0);
        }
        if (f === 'bulgu') {
          return fs + migrateBulgu(e.bulgu).reduce(function(ts, g){ return ts + (g.maddeler||[]).length; }, 0);
        }
        return fs + (e[f]||[]).length;
      }, 0);
    }, 0);
  };

  var disItems = countItems(dis, ['tanim','sorgu','bulgu','tetkik','tedavi','notlar']);
  var finItems = countItems(fin, ['tanim','sorgu','tetkik','notlar']);
  var symItems = countItems(sym, ['tanim','sorgu','tetkik','notlar']);
  var infItems = countItems(inf, ['items']);

  var totalCards = dis.length + fin.length + sym.length + inf.length;
  var totalItems = disItems + finItems + symItems + infItems;
  var pool = localDb.pool || {};
  var poolTotal = ['tanim','sorgu','tetkik','notlar'].reduce(function(s,f){ return s+(pool[f]||[]).length; }, 0);

  var html = '<div class="s-section">'
    + '<div class="s-section-title">Kartlar</div>'
    + statRow('Hastalık', dis.length, 'var(--dis)')
    + statRow('Bulgu', fin.length, 'var(--fin)')
    + statRow('Belirti', sym.length, 'var(--sym)')
    + statRow('Bilgi Kartı', inf.length, '#b7860b')
    + '</div>'
    + '<div class="s-divider"></div>'
    + '<div class="s-section">'
    + '<div class="s-section-title">Maddeler</div>'
    + statRow('Hastalık maddeleri', disItems, 'var(--dis)')
    + statRow('Bulgu maddeleri', finItems, 'var(--fin)')
    + statRow('Belirti maddeleri', symItems, 'var(--sym)')
    + statRow('Bilgi maddeleri', infItems, '#b7860b')
    + '</div>'
    + '<div class="s-divider"></div>'
    + '<div class="s-section">'
    + '<div class="s-section-title">Genel</div>'
    + statRow('Toplam kart', totalCards, 'var(--text2)')
    + statRow('Toplam madde', totalItems, 'var(--text2)')
    + statRow('Havuz maddesi', poolTotal, 'var(--text2)')
    + '</div>'
    + '<div class="s-divider"></div>';

  document.getElementById('statsBody').innerHTML = html;
}
function statRow(label, val, color) {
  return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">'
    + '<span style="font-size:13px;color:var(--text2);">' + label + '</span>'
    + '<span style="font-size:15px;font-weight:800;font-family:\'Nunito\',sans-serif;color:' + color + ';">' + val + '</span>'
    + '</div>';
}


// ── INIT ──
ensurePool();
ensureTrash();
rebuildPoolFromEntries();
renderAll();
updateTrashBadge();
switchTab('disease');
</script>
