<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLog</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta name="theme-color" content="#c0392b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MedLog">
<link rel="apple-touch-icon" sizes="512x512" href="icon.png?v=2">
<link rel="icon" type="image/png" sizes="512x512" href="icon.png?v=2">
<link rel="shortcut icon" href="icon.png?v=2">
<style>
:root {
  --bg:#f5f2ee; --surface:#fff; --surface2:#faf8f5;
  --border:#e4ddd4; --border2:#cec4b8;
  --text:#1a1714; --text2:#5c524a; --text3:#9c8f84;
  --dis:#c0392b; --dis-bg:#fdf0ee; --dis-border:#f5c6c0;
  --fin:#1a6fa8; --fin-bg:#eaf3fb; --fin-border:#a8d0ed;
  --sym:#1a7a6e; --sym-bg:#e8f5f3; --sym-border:#a8d8d2;
  --radius:14px; --radius-sm:9px;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

header{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:56px;gap:16px;}
.logo{font-family:'Lora',serif;font-size:19px;font-weight:600;color:var(--dis);flex-shrink:0;}
.logo span{color:var(--text);}
.search-wrap{position:relative;flex:1;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
#searchInput{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:24px;padding:8px 14px 8px 36px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;}
#searchInput:focus{border-color:var(--dis);box-shadow:0 0 0 3px var(--dis-bg);}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.saving-dot{width:8px;height:8px;border-radius:50%;background:transparent;flex-shrink:0;transition:background .3s;}
.saving-dot.saving{background:#f39c12;animation:pulse .6s infinite;}
.saving-dot.saved{background:#27ae60;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.settings-btn{background:none;border:none;padding:0;margin:0;cursor:pointer;color:var(--text2);font-size:20px;display:flex;align-items:center;transition:opacity .15s;line-height:1;width:20px;height:20px;}
.settings-btn:hover{opacity:.6;}

.settings-panel{position:fixed;inset:0;z-index:300;display:none;}
.settings-panel.open{display:block;}
.s-backdrop{position:absolute;inset:0;background:rgba(26,23,20,.4);backdrop-filter:blur(2px);}
.s-drawer{position:absolute;top:0;right:0;bottom:0;width:min(340px,92vw);background:var(--surface);border-left:1.5px solid var(--border);display:flex;flex-direction:column;animation:drawerIn .22s ease;box-shadow:-4px 0 32px rgba(0,0,0,.1);}
@keyframes drawerIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.s-head{padding:18px 20px 14px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.s-head-title{font-family:'Lora',serif;font-size:17px;font-weight:600;}
.s-close{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;cursor:pointer;color:var(--text3);font-size:14px;transition:all .15s;}
.s-close:hover{background:var(--bg);}
.s-body{flex:1;overflow-y:auto;padding:18px 20px;}
.s-section{margin-bottom:22px;}

.s-section-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);font-family:'DM Mono',monospace;margin-bottom:10px;}
.auth-block{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;}
.auth-user-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.auth-avatar{width:38px;height:38px;border-radius:50%;border:2px solid var(--border);object-fit:cover;flex-shrink:0;}
.auth-name{font-size:13px;font-weight:700;color:var(--text);}
.auth-email{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px;}
.auth-note{font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:10px;}
.sync-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;margin-bottom:10px;}
.sync-badge.synced{background:#eafaf1;color:#1e8449;border:1px solid #a9dfbf;}
.sync-badge.local{background:#fff8e1;color:#856404;border:1px solid #ffc107;}
.sync-badge .dot{width:6px;height:6px;border-radius:50%;}
.synced .dot{background:#27ae60;}
.local .dot{background:#f39c12;}
.s-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;margin-bottom:7px;}
.s-btn:last-child{margin-bottom:0;}
.s-btn:hover{background:var(--bg);border-color:var(--border2);}
.s-btn.google{background:#fff;border-color:#ddd;color:#333;}
.s-btn.google:hover{background:#f8f8f8;}
.s-btn.danger{color:var(--dis);}
.s-btn.danger:hover{background:var(--dis-bg);border-color:var(--dis-border);}
.s-divider{height:1px;background:var(--border);margin:10px 0;}

.tab-nav{display:flex;background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 14px;position:sticky;top:56px;z-index:90;}
.tab-btn{padding:12px 16px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text3);cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:color .15s;display:flex;align-items:center;justify-content:center;gap:6px;flex:1;}
.tab-btn .tab-dot{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0;vertical-align:middle;margin-bottom:1px;}
.tab-btn[data-tab="disease"]:hover,.tab-btn[data-tab="disease"].active{color:var(--dis);}
.tab-btn[data-tab="finding"]:hover,.tab-btn[data-tab="finding"].active{color:var(--fin);}
.tab-btn[data-tab="symptom"]:hover,.tab-btn[data-tab="symptom"].active{color:var(--sym);}
.tab-btn[data-tab="info"]:hover,.tab-btn[data-tab="info"].active{color:#b7860b;}
.tab-btn[data-tab="disease"].active{border-bottom-color:var(--dis);}
.tab-btn[data-tab="finding"].active{border-bottom-color:var(--fin);}
.tab-btn[data-tab="symptom"].active{border-bottom-color:var(--sym);}
.tab-btn[data-tab="info"].active{border-bottom-color:#b7860b;}

.add-entry-btn.info:hover{border-color:#b7860b;color:#b7860b;background:#fdf8ec;}

/* Info card */
.info-card .entry-header{border-left:3.5px solid #b7860b;}
.info-item-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.info-item-row:last-child{border-bottom:none;}
.info-item-dot{width:5px;height:5px;border-radius:50%;background:#b7860b;flex-shrink:0;margin-top:7px;}
.info-item-text{flex:1;font-size:13px;color:var(--text2);line-height:1.5;}
.info-item-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;padding:0;flex-shrink:0;margin-top:2px;transition:color .15s;}
.info-item-del:hover{color:var(--dis);}
.info-body-item{display:flex;align-items:flex-start;gap:8px;padding:7px 16px;transition:background .15s;}
.info-body-item:hover{background:var(--surface2);}
.info-body-dot{width:5px;height:5px;border-radius:50%;background:#b7860b;opacity:.7;flex-shrink:0;margin-top:7px;}
.info-body-text{flex:1;font-size:14px;color:var(--text2);line-height:1.5;}
.info-body-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;opacity:0;transition:opacity .15s,color .15s;padding:0 2px;line-height:1;flex-shrink:0;margin-top:2px;}
.info-body-item:hover .info-body-del{opacity:1;}
.info-body-del:hover{color:var(--dis);}

/* Pool drawer */
.pool-drawer-overlay{position:fixed;inset:0;background:rgba(26,23,20,.45);z-index:400;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
.pool-drawer-overlay.open{display:flex;}
@media(min-width:600px){.pool-drawer-overlay{align-items:center;}}
.pool-drawer{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:560px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 -4px 32px rgba(0,0,0,.12);animation:slideUp .22s ease;}
@media(min-width:600px){.pool-drawer{border-radius:var(--radius);max-height:78vh;}}
.pool-drawer-head{padding:16px 20px 12px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.pool-drawer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pool-drawer-title{font-family:'Lora',serif;font-size:16px;font-weight:600;flex:1;}
.pool-drawer-count{font-size:11px;font-weight:800;font-family:'DM Mono',monospace;color:var(--text3);margin-right:6px;}
.pool-drawer-close{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;cursor:pointer;color:var(--text3);font-size:14px;transition:all .15s;}
.pool-drawer-close:hover{background:var(--bg);}
.pool-drawer-body{flex:1;overflow-y:auto;padding:14px 20px;}
.pool-drawer-search{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--text);background:var(--surface2);outline:none;margin-bottom:12px;transition:border-color .2s;}
.pool-drawer-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;min-height:20px;}
.pool-drawer-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px 5px 12px;border-radius:14px;font-size:13px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);}
.pool-drawer-chip span{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pool-drawer-chip button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;padding:0 0 0 2px;flex-shrink:0;transition:color .15s;}
.pool-drawer-chip button:hover{color:var(--dis);}
.pool-drawer-empty{font-size:13px;color:var(--text3);font-style:italic;padding:4px 0 14px;}
.pool-drawer-add{display:flex;gap:8px;border-top:1px solid var(--border);padding-top:12px;}
.pool-drawer-input{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .2s;}
.pool-drawer-btn{border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;color:white;white-space:nowrap;transition:opacity .15s;}
.pool-drawer-btn:hover{opacity:.85;}

.app{max-width:820px;margin:0 auto;padding:20px 14px 80px;}
.tab-panel{display:none;}.tab-panel.active{display:block;}
#searchView{display:none;}#searchView.active{display:block;}
#mainView.hidden{display:none;}


.add-entry-btn{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px dashed var(--border2);border-radius:var(--radius);padding:13px 16px;margin-bottom:14px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text3);transition:all .15s;width:100%;}
.add-entry-btn.disease:hover{border-color:var(--dis);color:var(--dis);background:var(--dis-bg);}
.add-entry-btn.finding:hover{border-color:var(--fin);color:var(--fin);background:var(--fin-bg);}
.add-entry-btn.symptom:hover{border-color:var(--sym);color:var(--sym);background:var(--sym-bg);}

.sec-stats{font-size:12px;color:var(--text3);font-weight:700;margin-bottom:12px;}
.sec-stats strong{color:var(--text2);}

.entry-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .3s,border-color .3s;}
.entry-header{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .15s;}
.entry-header:hover{background:var(--surface2);}
.e-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.disease .e-dot{background:var(--dis);}
.finding .e-dot{background:var(--fin);}
.symptom .e-dot{background:var(--sym);}
.e-title{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--text);flex:1;}
.e-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;opacity:0;transition:opacity .15s,color .15s;padding:2px 4px;}
.entry-header:hover .e-del{opacity:1;}
.e-del:hover{color:var(--dis);}
.chevron{color:var(--text3);transition:transform .2s;font-size:11px;flex-shrink:0;}
.entry-card.open .chevron{transform:rotate(180deg);}
.entry-body{display:none;border-top:1.5px solid var(--border);}
.entry-card.open .entry-body{display:block;}

.field-section{border-bottom:1px solid var(--border);}
.field-section:last-child{border-bottom:none;}
.field-header{padding:10px 16px 6px;}
.field-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;font-family:'DM Mono',monospace;}
.item-row{display:flex;align-items:flex-start;gap:8px;padding:6px 16px 6px 32px;transition:background .15s;}
.item-row:hover{background:var(--surface2);}
.i-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:7px;opacity:.4;background:var(--text2);}
.i-text{flex:1;font-size:14px;color:var(--text2);line-height:1.5;}
.i-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;opacity:0;transition:opacity .15s,color .15s;padding:0 2px;line-height:1;flex-shrink:0;margin-top:2px;}
.item-row:hover .i-del{opacity:1;}
.i-del:hover{color:var(--dis);}

.overlay{display:none;position:fixed;inset:0;background:rgba(26,23,20,.45);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
.overlay.open{display:flex;}
@media(min-width:600px){.overlay{align-items:center;}}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 -4px 32px rgba(0,0,0,.12);animation:slideUp .22s ease;}
@media(min-width:600px){.modal{border-radius:var(--radius);max-height:85vh;}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-header{padding:18px 20px 14px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.modal-header-title{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--text);flex:1;}
.modal-close{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;cursor:pointer;color:var(--text3);font-size:14px;transition:all .15s;}
.modal-close:hover{background:var(--bg);}
.modal-body{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:16px;}
.mfield label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;margin-bottom:6px;}
.mfield-tanim label{color:var(--text3);}
.mfield-sorgu label{color:#8e44ad;}
.mfield-tetkik label{color:#d35400;}
.mfield-notlar label{color:#1a7a6e;}
.mfield input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .2s,box-shadow .2s;}
.mfield input:focus{border-color:var(--dis);box-shadow:0 0 0 3px var(--dis-bg);}
.mfield input::placeholder{color:var(--text3);}
.modal-footer{padding:14px 20px;border-top:1.5px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.btn-cancel{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 18px;cursor:pointer;color:var(--text2);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;transition:all .15s;}
.btn-cancel:hover{background:var(--bg);}
.btn-save{border:none;border-radius:var(--radius-sm);padding:9px 24px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;color:white;margin-left:auto;transition:opacity .15s;}
.btn-save:hover{opacity:.85;}
.btn-save.disease{background:var(--dis);}
.btn-save.finding{background:var(--fin);}
.btn-save.symptom{background:var(--sym);}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}

.search-result{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:border-color .15s;}
.search-result:hover{border-color:var(--border2);}
.sr-header{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--border);}
.sr-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.4px;}
.sr-badge.disease{background:var(--dis-bg);color:var(--dis);}
.sr-badge.finding{background:var(--fin-bg);color:var(--fin);}
.sr-badge.symptom{background:var(--sym-bg);color:var(--sym);}
.sr-title{font-family:'Lora',serif;font-size:15px;font-weight:600;flex:1;}
.sr-goto{font-size:11px;color:var(--text3);font-weight:700;opacity:0;transition:opacity .15s;white-space:nowrap;}
.search-result:hover .sr-goto{opacity:1;}
.sr-field{padding:8px 16px;border-bottom:1px solid var(--border);}
.sr-field:last-child{border-bottom:none;}
.sr-field-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;margin-bottom:4px;}
.sr-field-label.tanim{color:var(--text3);}
.sr-field-label.sorgu{color:#8e44ad;}
.sr-field-label.tetkik{color:#d35400;}
.sr-field-label.notlar{color:#1a7a6e;}
.sr-item{font-size:14px;color:var(--text2);padding:2px 0 2px 10px;}
mark{background:#ffeaa7;border-radius:3px;padding:0 2px;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-state .ei{font-size:44px;margin-bottom:12px;}
.empty-state h3{font-family:'Lora',serif;font-size:17px;color:var(--text2);margin-bottom:6px;}
.empty-state p{font-size:14px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1714;color:white;padding:9px 20px;border-radius:24px;font-size:13px;font-weight:700;z-index:999;transition:transform .3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Confirm dialog */
.confirm-overlay{position:fixed;inset:0;background:rgba(26,23,20,.45);z-index:600;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.confirm-overlay.open{display:flex;}
.confirm-box{background:var(--surface);border-radius:var(--radius);padding:24px 20px 16px;width:min(320px,88vw);box-shadow:0 8px 40px rgba(0,0,0,.18);animation:slideUp .18s ease;}
.confirm-msg{font-size:15px;color:var(--text);line-height:1.5;margin-bottom:18px;text-align:center;}
.confirm-btns{display:flex;gap:8px;justify-content:flex-end;}
.confirm-cancel{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text2);transition:all .15s;}
.confirm-cancel:hover{background:var(--bg);}
.confirm-ok{border:none;border-radius:var(--radius-sm);padding:8px 18px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:white;background:var(--dis);transition:opacity .15s;}
.confirm-ok:hover{opacity:.85;}

/* ── AUTOCOMPLETE ── */
.ac-wrap{position:relative;}
.ac-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius-sm);box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:500;max-height:200px;overflow-y:auto;display:none;}
.ac-dropdown.open{display:block;}
.ac-item{padding:8px 12px;font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s;}
.ac-item:hover,.ac-item.focused{background:var(--bg);}
.ac-item .ac-icon{font-size:10px;opacity:.4;flex-shrink:0;}

/* ── PULL TO REFRESH ── */
#ptr-indicator{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:10px;
  height:0;overflow:hidden;
  background:var(--surface);
  border-bottom:1.5px solid var(--border);
  z-index:150;
  transition:height .2s ease, opacity .2s ease;
  opacity:0;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text3);
}
#ptr-indicator.pulling{opacity:1;}
#ptr-indicator.ready{color:var(--dis);}
#ptr-indicator.refreshing{height:52px;opacity:1;}
.ptr-spinner{
  width:18px;height:18px;
  border:2.5px solid var(--border2);
  border-top-color:var(--dis);
  border-radius:50%;
  flex-shrink:0;
  transition:transform .25s ease;
}
#ptr-indicator.refreshing .ptr-spinner{
  animation:ptr-spin .7s linear infinite;
}
@keyframes ptr-spin{to{transform:rotate(360deg);}}
</style>
</head>

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ── CONSTANTS ──
const LABELS = { disease:'Hastalık', finding:'Bulgu', symptom:'Belirti', info:'Bilgi' };
const FIELD_LABELS = { tanim:'Tanım', sorgu:'Sorgu', tetkik:'Tetkik', notlar:'Notlar' };
const FIELDS = ['tanim','sorgu','tetkik','notlar'];
const FIELD_COLORS = { tanim:'var(--text3)', sorgu:'#8e44ad', tetkik:'#d35400', notlar:'#1a7a6e' };
const STORAGE_KEY = 'medlog_local';

// ── STATE ──
let localDb = loadLocal();
let currentUser = null;
let saveTimeout = null;
let modalType = 'disease';
let modalItems = { tanim:[], sorgu:[], tetkik:[], notlar:[] };
let editingId = null;
let searchQuery = '';

// ── LOCAL STORAGE ──
function loadLocal() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || emptyDb(); }
  catch { return emptyDb(); }
}
function emptyDb() { return { disease:[], finding:[], symptom:[], info:[], pool:{ tanim:[], sorgu:[], tetkik:[], notlar:[] } }; }

function ensurePool() {
  if (!localDb.pool) localDb.pool = { tanim:[], sorgu:[], tetkik:[], notlar:[] };
  FIELDS.forEach(function(f){ if (!Array.isArray(localDb.pool[f])) localDb.pool[f] = []; });
}

// Havuzu mevcut tüm kartlardan sıfırdan oluştur (additive değil, exact)
function rebuildPoolFromEntries() {
  ensurePool();
  FIELDS.forEach(function(field) {
    var seen = new Map();
    ['disease','finding','symptom'].forEach(function(type) {
      (localDb[type]||[]).forEach(function(entry) {
        (entry[field]||[]).forEach(function(item) {
          if (item && item.trim()) seen.set(item.trim().toLowerCase(), item.trim());
        });
      });
    });
    if (field === 'notlar') {
      (localDb.info||[]).forEach(function(entry) {
        (entry.items||[]).forEach(function(item) {
          if (item && item.trim()) seen.set(item.trim().toLowerCase(), item.trim());
        });
      });
    }
    localDb.pool[field] = Array.from(seen.values());
  });
}

function addToPool(field, value) {
  ensurePool();
  var v = value.trim();
  if (!v) return;
  var exists = localDb.pool[field].some(function(x){ return x.toLowerCase() === v.toLowerCase(); });
  if (!exists) localDb.pool[field].push(v);
}

function saveLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(localDb)); }

// ── FIREBASE ──
const firebaseConfig = {
  apiKey: "AIzaSyC1HDjkHNapGylUPNGz8XNf4NJrjmdv9pk",
  authDomain: "medlog-75feb.firebaseapp.com",
  projectId: "medlog-75feb",
  storageBucket: "medlog-75feb.firebasestorage.app",
  messagingSenderId: "165951851729",
  appId: "1:165951851729:web:1d04db1afb934784e3c9f0"
};

let auth, db;
try {
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();

  auth.onAuthStateChanged(async function(user) {
    if (user) {
      currentUser = user;
      await syncFromFirebase();
      updateAuthUI(true, user);
      renderAll();
    } else {
      currentUser = null;
      updateAuthUI(false, null);
    }
  });
} catch(e) { /* Firebase yüklenemedi, yerel mod aktif */ }

// ── FIRESTORE ──
function userDocRef() {
  return db.collection('users').doc(currentUser.uid).collection('data').doc('medlog');
}

async function syncFromFirebase() {
  try {
    const snap = await userDocRef().get();
    if (snap.exists) {
      const remote = snap.data();
      ['disease','finding','symptom'].forEach(type => {
        const remoteIds = new Set((remote[type]||[]).map(e => e.id));
        const localOnly = (localDb[type]||[]).filter(e => !remoteIds.has(e.id));
        localDb[type] = [...(remote[type]||[]), ...localOnly];
      });
      // Pool merge: remote pool öncelikli, local'dekiler eklenir
      if (remote.pool) {
        FIELDS.forEach(function(f) {
          const merged = new Map();
          (remote.pool[f]||[]).forEach(function(x){ merged.set(x.toLowerCase(), x); });
          ((localDb.pool||{})[f]||[]).forEach(function(x){ if(!merged.has(x.toLowerCase())) merged.set(x.toLowerCase(), x); });
          localDb.pool[f] = Array.from(merged.values());
        });
      }
    }
    rebuildPoolFromEntries();
    await userDocRef().set(localDb);
    saveLocal();
  } catch(e) { console.error('Sync error:', e); }
}

function scheduleSave() {
  rebuildPoolFromEntries();
  setSaving(true);
  saveLocal();
  if (!currentUser || !db) { setSaving(false, true); return; }
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async function() {
    try {
      await userDocRef().set(localDb);
      setSaving(false, true);
    } catch(e) {
      console.error('Save error:', e);
      showToast('❌ Firebase kayıt hatası');
      setSaving(false, false);
    }
  }, 800);
}

function setSaving(saving, success) {
  const dot = document.getElementById('savingDot');
  if (!dot) return;
  if (saving) { dot.className = 'saving-dot saving'; }
  else if (success) { dot.className = 'saving-dot saved'; setTimeout(function(){ dot.className = 'saving-dot'; }, 2000); }
  else { dot.className = 'saving-dot'; }
}

function updateAuthUI(loggedIn, user) {
  document.getElementById('authLoggedOut').style.display = loggedIn ? 'none' : 'block';
  document.getElementById('authLoggedIn').style.display = loggedIn ? 'block' : 'none';
  if (loggedIn && user) {
    document.getElementById('authAvatar').src = user.photoURL || '';
    document.getElementById('authName').textContent = user.displayName || '';
    document.getElementById('authEmail').textContent = user.email || '';
  }
}

function signInWithGoogle() {
  if (!auth) { showToast('Firebase bağlantısı yok'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(e) { showToast('❌ Giriş başarısız'); console.error(e); });
}

function doSignOut() {
  if (!auth) return;
  auth.signOut().then(function() { showToast('👋 Çıkış yapıldı'); closeSettings(); });
}

// ── SETTINGS ──
function openSettings() {
  document.getElementById('settingsPanel').classList.add('open');
}
function closeSettings() { document.getElementById('settingsPanel').classList.remove('open'); }

// ── TAB ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab === tab); });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.toggle('active', p.id === 'panel-' + tab); });
  document.querySelectorAll('.entry-card.open').forEach(function(c){ c.classList.remove('open'); });
  if (tab === 'info') renderInfoList();
}

// ── MODAL ──
function openModal(type, entryId) {
  modalType = type;
  editingId = entryId || null;
  modalItems = { tanim:[], sorgu:[], tetkik:[], notlar:[] };
  if (entryId) {
    const entry = localDb[type].find(function(e){ return e.id === entryId; });
    if (entry) {
      document.getElementById('m-title').value = entry.title;
      FIELDS.forEach(function(f){ modalItems[f] = (entry[f]||[]).slice(); });
      document.getElementById('modalTitle').textContent = entry.title + ' — Düzenle';
    }
  } else {

  }

  setTimeout(function(){ document.getElementById('m-title').focus(); }, 100);

function closeModal() {

}

function addModalItem(field, value) {
  const inp = document.getElementById('m-' + field + '-new');
  const val = (value !== undefined ? value : inp.value).trim();
  if (!val) return;
  if (modalItems[field].some(function(x){ return x.toLowerCase() === val.toLowerCase(); })) {
    showToast('Bu madde zaten eklendi'); return;
  }
  modalItems[field].push(val);
  inp.value = '';
  acClose(field);
  renderModalItems();
  updatePoolBadges();
  inp.focus();
}

// ── AUTOCOMPLETE ──
var acFocusIdx = { tanim:-1, sorgu:-1, tetkik:-1, notlar:-1 };

function acGetSuggestions(field, query) {
  ensurePool();
  const pool = localDb.pool[field] || [];
  const q = query.toLowerCase().trim();
  const alreadyAdded = new Set(modalItems[field].map(function(x){ return x.toLowerCase(); }));
  if (!q) {
    // Boşken tüm havuzu göster (eklenmemişleri)
    return pool.filter(function(x){ return !alreadyAdded.has(x.toLowerCase()); }).slice(0, 10);
  }
  return pool.filter(function(x){
    return x.toLowerCase().includes(q) && !alreadyAdded.has(x.toLowerCase());
  }).slice(0, 10);
}

function acInput(field) {
  var inp = document.getElementById('m-' + field + '-new');
  var q = inp.value.trim();
  var suggestions = acGetSuggestions(field, q);
  acFocusIdx[field] = -1;
  renderAcDropdown(field, q, suggestions);
}

function renderAcDropdown(field, q, suggestions) {
  var dd = document.getElementById('ac-' + field);
  if (!dd) return;
  if (!suggestions.length) {
    dd.classList.remove('open');
    return;
  }
  var qRe = q ? q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') : '';
  var html = suggestions.map(function(s, i) {
    var label = q ? esc(s).replace(new RegExp('(' + qRe + ')', 'gi'), '<mark>$1</mark>') : esc(s);
    var safeVal = esc(s).replace(/'/g,'&#39;');
    return '<div class="ac-item" id="ac-item-' + field + '-' + i + '" onmousedown="acSelect(event,\'' + field + '\',\'' + safeVal + '\')">' +
      '<span class="ac-icon">&#x21A9;</span><span style="flex:1">' + label + '</span>' +
      '</div>';
  }).join('');
  if (q) {
    var alreadyInPool = (localDb.pool[field]||[]).some(function(x){ return x.toLowerCase() === q.toLowerCase(); });
    if (!alreadyInPool) {
      html += '<div class="ac-new-hint">Enter ile yeni madde ekle: <span>' + esc(q) + '</span></div>';
    }
  }
  dd.innerHTML = html;
  dd.classList.add('open');
}

function acSelect(e, field, value) {
  e.preventDefault();
  addModalItem(field, value);
}

function acClose(field) {
  var dd = document.getElementById('ac-' + field);
  if (dd) dd.classList.remove('open');
  acFocusIdx[field] = -1;
}

function acBlur(field) {
  setTimeout(function(){ acClose(field); }, 150);
}

function acKeydown(e, field) {
  var dd = document.getElementById('ac-' + field);
  var items = dd ? dd.querySelectorAll('.ac-item') : [];
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acFocusIdx[field] = Math.min(acFocusIdx[field] + 1, items.length - 1);
    acHighlight(field, items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acFocusIdx[field] = Math.max(acFocusIdx[field] - 1, -1);
    acHighlight(field, items);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (acFocusIdx[field] >= 0 && items[acFocusIdx[field]]) {
      items[acFocusIdx[field]].dispatchEvent(new MouseEvent('mousedown'));
    } else {
      addModalItem(field);
    }
  } else if (e.key === 'Escape') {
    acClose(field);
  }
}

function acHighlight(field, items) {
  items.forEach(function(el, i) {
    el.classList.toggle('focused', i === acFocusIdx[field]);
  });
}

function removeModalItem(field, idx) {
  modalItems[field].splice(idx, 1);
  renderModalItems();
}

function renderModalItems() {
  FIELDS.forEach(function(field) {
    document.getElementById('items-' + field).innerHTML = modalItems[field].map(function(item, i) {
      return '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border)">' +
        '<span style="font-size:12px;color:var(--text3);flex-shrink:0">&#8226;</span>' +
        '<span style="flex:1;font-size:13px;color:var(--text2);cursor:text;" title="Düzenlemek için tıkla" onclick="startEditModalItem(\'' + field + '\',' + i + ',this)">' + esc(item) + '</span>' +
        '<button onclick="removeModalItem(\'' + field + '\',' + i + ')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;padding:0;flex-shrink:0">&#215;</button>' +
        '</div>';

}

function startEditModalItem(field, idx, el) {
  var current = modalItems[field][idx];
  var inp = document.createElement('input');
  inp.value = current;
  inp.style.cssText = 'flex:1;font-size:13px;color:var(--text);border:1.5px solid var(--dis);border-radius:6px;padding:2px 6px;font-family:Nunito,sans-serif;outline:none;width:100%;';
  el.replaceWith(inp);
  inp.focus(); inp.select();
  function commit() {
    var val = inp.value.trim();
    if (val && val !== current) {
      var dup = modalItems[field].some(function(x,j){ return j!==idx && x.toLowerCase()===val.toLowerCase(); });
      if (dup) { showToast('Bu madde zaten var'); renderModalItems(); return; }
      modalItems[field][idx] = val;
    }
    renderModalItems();
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', function(e) {
    if (e.key==='Enter') { e.preventDefault(); inp.blur(); }
    if (e.key==='Escape') { inp.value=current; inp.blur(); }
  });
}

function saveModal() {
  const title = document.getElementById('m-title').value.trim();
  if (!title) { showToast('Başlık gir'); document.getElementById('m-title').focus(); return; }
  const btn = document.getElementById('modalSaveBtn');
  btn.disabled = true;
  if (editingId) {
    const idx = localDb[modalType].findIndex(function(e){ return e.id === editingId; });
    if (idx > -1) localDb[modalType][idx] = Object.assign({}, localDb[modalType][idx], { title:title, tanim:modalItems.tanim.slice(), sorgu:modalItems.sorgu.slice(), tetkik:modalItems.tetkik.slice(), notlar:modalItems.notlar.slice() });
  } else {
    if (localDb[modalType].find(function(e){ return e.title.toLowerCase() === title.toLowerCase(); })) {
      showToast('Bu kayıt zaten var'); btn.disabled = false; return;
    }
    localDb[modalType].unshift({ id: Date.now().toString(), title:title, tanim:modalItems.tanim.slice(), sorgu:modalItems.sorgu.slice(), tetkik:modalItems.tetkik.slice(), notlar:modalItems.notlar.slice() });
  }
  scheduleSave();
  // Pool'u kapat kapatmadan önce güncelle (closeModal editingId'yi sıfırlar)
  FIELDS.forEach(function(f){ modalItems[f].forEach(function(v){ addToPool(f,v); }); });
  closeModal();
  renderList(modalType);
  btn.disabled = false;
  showToast(editingId ? '✓ Güncellendi' : '✓ Eklendi');
}

// ── SEARCH ──
document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  const sv = document.getElementById('searchView'), mv = document.getElementById('mainView');
  if (searchQuery) { sv.classList.add('active'); mv.classList.add('hidden'); doSearch(searchQuery); }
  else { sv.classList.remove('active'); mv.classList.remove('hidden'); }
});

function doSearch(q) {
  const ql = q.toLowerCase(), results = [];
  ['disease','finding','symptom'].forEach(function(type) {
    localDb[type].forEach(function(entry) {
      const titleMatch = entry.title.toLowerCase().includes(ql);
      const fieldMatches = {};
      let anyMatch = false;
      FIELDS.forEach(function(f) {
        const matched = (entry[f]||[]).filter(function(i){ return i.toLowerCase().includes(ql); });
        if (matched.length) { fieldMatches[f] = matched; anyMatch = true; }
        else if (titleMatch) { fieldMatches[f] = entry[f]||[]; }
      });
      if (titleMatch || anyMatch) results.push({ type:type, entry:entry, fieldMatches:fieldMatches });
    });
  });

  document.getElementById('searchStats').innerHTML = '"<strong>' + esc(q) + '</strong>" için <strong>' + results.length + '</strong> sonuç';
  const container = document.getElementById('searchResults');
  if (!results.length) { container.innerHTML = '<div class="empty-state"><div class="ei">🔍</div><h3>Sonuç bulunamadı</h3><p>"' + esc(q) + '" ile eşleşen kayıt yok.</p></div>'; return; }

  container.innerHTML = results.map(function(r) {
    const fh = FIELDS.map(function(field) {
      const items = r.fieldMatches[field]||[];
      if (!items.length) return '';
      return '<div class="sr-field"><div class="sr-field-label ' + field + '" style="color:' + FIELD_COLORS[field] + '">' + FIELD_LABELS[field] + '</div>' +
        items.map(function(i){ return '<div class="sr-item">• ' + hl(i,q) + '</div>'; }).join('') + '</div>';
    }).join('');
    const safeType = esc(r.type);
    const safeId = esc(r.entry.id);
    return '<div class="search-result" onclick="goToCard(\'' + safeType + '\',\'' + safeId + '\')">' +
      '<div class="sr-header"><span class="sr-badge ' + safeType + '">' + LABELS[r.type] + '</span><span class="sr-title">' + hl(r.entry.title,q) + '</span><span class="sr-goto">Git →</span></div>' +
      (fh || '<div class="sr-field" style="color:var(--text3);font-size:13px;font-style:italic">Başlıkta eşleşme</div>') + '</div>';
  }).join('');
}

function goToCard(type, id) {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchView').classList.remove('active');
  document.getElementById('mainView').classList.remove('hidden');
  switchTab(type);
  setTimeout(function() {
    const card = document.getElementById('card-' + id);
    if (!card) return;
    card.classList.add('open');
    card.scrollIntoView({ behavior:'smooth', block:'center' });
    const color = type==='disease'?'var(--dis)':type==='finding'?'var(--fin)':'var(--sym)';
    card.style.boxShadow = '0 0 0 3px ' + color;
    setTimeout(function(){ card.style.boxShadow = ''; }, 1800);
  }, 80);
}

// ── EXPORT / IMPORT / CLEAR ──
function exportData() {
  const blob = new Blob([JSON.stringify(localDb, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'medlog_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  showToast('📤 Dışa aktarıldı');
  closeSettings();
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imp = JSON.parse(ev.target.result); let added = 0;
      ['disease','finding','symptom','info'].forEach(function(type) {
        if (!Array.isArray(imp[type])) return;
        var ids = new Set(localDb[type].map(function(e){ return e.id; }));
        imp[type].forEach(function(entry){
          if (!entry.id || !/^[a-zA-Z0-9_-]+$/.test(String(entry.id))) return;
          if (typeof entry.title !== 'string' || !entry.title.trim()) return;
          if (ids.has(entry.id)) return;
          // Sadece bilinen alanları al, ham objeyi kopyalama
          var clean;
          if (type === 'info') {
            clean = { id: entry.id, title: entry.title.trim(), items: Array.isArray(entry.items) ? entry.items.filter(function(x){ return typeof x === 'string'; }).map(function(x){ return x.trim(); }).filter(Boolean) : [] };
          } else {
            clean = { id: entry.id, title: entry.title.trim() };
            FIELDS.forEach(function(f){ clean[f] = Array.isArray(entry[f]) ? entry[f].filter(function(x){ return typeof x === 'string'; }).map(function(x){ return x.trim(); }).filter(Boolean) : []; });
          }
          localDb[type].push(clean);
          added++;
        });
      });
      // Pool merge
      if (imp.pool) {
        ensurePool();
        FIELDS.forEach(function(f) {
          const existing = new Set(localDb.pool[f].map(function(x){ return x.toLowerCase(); }));
          (imp.pool[f]||[]).forEach(function(x){ if(x && !existing.has(x.toLowerCase())){ localDb.pool[f].push(x); existing.add(x.toLowerCase()); } });
        });
      }
      rebuildPoolFromEntries();
      scheduleSave(); renderAll(); closeSettings();
      showToast('✓ ' + added + ' giriş içe aktarıldı');
    } catch(err) { showToast('❌ Geçersiz dosya'); }
  };
  reader.readAsText(file); e.target.value = '';
}

function clearAllData() {
  showConfirm('Tüm veriler silinecek. Bu işlem geri alınamaz. Emin misin?', function() {
    localDb = emptyDb();
    scheduleSave(); renderAll(); closeSettings();
    showToast('🗑 Tüm veriler silindi');
  });
}

  });
}

function deleteInfoItem(entryId, idx) {
  var entry = (localDb.info||[]).find(function(e){ return e.id === entryId; });
  if (!entry) return;
  entry.items.splice(idx, 1);
  scheduleSave(); renderInfoList();
}

function toggleInfoCard(id) {
  var c = document.getElementById('icard-' + id);
  if (c) c.classList.toggle('open');
}

function infoCardHTML(entry) {
  var safeId = esc(entry.id);
  var wasOpen = (function(){ var c = document.getElementById('icard-' + entry.id); return c && c.classList.contains('open'); })();
  var itemsHtml = (entry.items||[]).map(function(item, i) {
    return '<div class="info-body-item">' +
      '<span class="info-body-dot"></span>' +
      '<span class="info-body-text">' + esc(item) + '</span>' +
      '<button class="info-body-del" title="Düzenle" onclick="editInfoItem(\'' + safeId + '\',' + i + ',this)">✏️</button>' +
      '<button class="info-body-del" onclick="deleteInfoItem(\'' + safeId + '\',' + i + ')">&#215;</button>' +
      '</div>';
  }).join('') || '<div style="padding:10px 16px;font-size:13px;color:var(--text3);font-style:italic;">Not yok</div>';

  return '<div class="entry-card info' + (wasOpen ? ' open' : '') + '" id="icard-' + safeId + '">' +
    '<div class="entry-header" onclick="toggleInfoCard(\'' + safeId + '\')">' +
      '<span class="e-dot" style="background:#b7860b"></span>' +
      '<span class="e-title">' + esc(entry.title) + '</span>' +
      '<button class="e-del" onclick="event.stopPropagation();openInfoModal(\'' + safeId + '\')" title="Düzenle">✏️</button>' +
      '<button class="e-del" onclick="event.stopPropagation();deleteInfoEntry(\'' + safeId + '\')" title="Sil">🗑</button>' +
      '<span class="chevron">▾</span>' +
    '</div>' +
    '<div class="entry-body"><div>' + itemsHtml + '</div></div>' +
    '</div>';
}

function renderInfoList() {
  if (!localDb.info) localDb.info = [];
  var container = document.getElementById('list-info');
  var entries = localDb.info;
  var statsEl = document.getElementById('stats-info');
  if (statsEl) statsEl.innerHTML = '<strong>' + entries.length + '</strong> kart · <strong>' + entries.reduce(function(a,e){ return a+(e.items||[]).length; },0) + '</strong> madde';
  if (!entries.length) {
    container.innerHTML = '<div class="empty-state"><div class="ei">📋</div><h3>Henüz bilgi kartı eklenmedi</h3><p>Yukarıdaki butona tıklayarak ilk kartını ekle.</p></div>';
    return;
  }
  container.innerHTML = entries.map(infoCardHTML).join('');
}

// ── POOL VIEWER ──
var POOL_FIELD_META = FIELDS.map(function(k){ return { key:k, label:FIELD_LABELS[k], color:FIELD_COLORS[k] }; });

function openPoolViewer() {
  rebuildPoolFromEntries();
  document.getElementById('poolViewerSearch').value = '';
  renderPoolViewer();
  document.getElementById('poolDrawerOverlay').classList.add('open');
  setTimeout(function(){ document.getElementById('poolViewerSearch').focus(); }, 120);
}

function closePoolViewer() {
  document.getElementById('poolDrawerOverlay').classList.remove('open');
}

function renderPoolViewer() {
  ensurePool();
  var filter = (document.getElementById('poolViewerSearch').value || '').toLowerCase();
  var container = document.getElementById('poolViewerContent');
  container.innerHTML = POOL_FIELD_META.map(function(f) {
    var items = localDb.pool[f.key]
      .slice().sort(function(a,b){ return a.localeCompare(b,'tr'); })
      .filter(function(v){ return !filter || v.toLowerCase().includes(filter); });
    if (!items.length && filter) return '';
    var chipsHtml = items.length
      ? '<div class="pool-drawer-chips">' + items.map(function(v){
          return '<span class="pool-drawer-chip"><span>' + esc(v) + '</span></span>';
        }).join('') + '</div>'
      : '<div class="pool-drawer-empty">Henüz madde yok</div>';
    return '<div style="margin-bottom:16px">' +
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">' +
        '<span style="width:8px;height:8px;border-radius:50%;background:' + f.color + ';display:inline-block;flex-shrink:0"></span>' +
        '<span style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;font-family:\'DM Mono\',monospace;color:' + f.color + '">' + f.label + '</span>' +
        '<span style="font-size:10px;color:var(--text3);font-family:\'DM Mono\',monospace;margin-left:4px">' + localDb.pool[f.key].length + ' madde</span>' +
      '</div>' +
      chipsHtml +
    '</div>';
  }).join('');
}

// ── POOL MANAGER UI ──
function updatePoolBadges() {
  ensurePool();
  FIELDS.forEach(function(f) {
    var el = document.getElementById('pool-badge-' + f);
    if (el) {
      var count = localDb.pool[f].length;
      el.textContent = count > 0 ? count + ' havuzda' : '';

}

// ── HELPERS ──
function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hl(text, q) {
  var e = esc(text);
  var qe = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return e.replace(new RegExp(qe,'gi'), function(m){ return '<mark>' + m + '</mark>'; });
}
function showConfirm(msg, onOk) {
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmOk').onclick = function() { closeConfirm(); onOk(); };
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

// ── PULL TO REFRESH ──
(function(){
  var PTR_THRESHOLD = 72; // px to trigger refresh
  var startY = 0, currentY = 0, pulling = false, refreshing = false;
  var ind = document.getElementById('ptr-indicator');
  var spinner = document.getElementById('ptr-spinner');
  var label = document.getElementById('ptr-label');

  function canPull() {
    return window.scrollY === 0 && !refreshing;
  }

  document.addEventListener('touchstart', function(e){
    if (!canPull()) return;
    startY = e.touches[0].clientY;
    pulling = true;
  }, { passive: true });

  document.addEventListener('touchmove', function(e){
    if (!pulling || !canPull()) return;
    currentY = e.touches[0].clientY;
    var dist = Math.max(0, currentY - startY);
    if (dist <= 0) return;

    // Rubber-band damping
    var pull = Math.min(dist * 0.45, PTR_THRESHOLD * 1.1);
    var ratio = Math.min(pull / PTR_THRESHOLD, 1);

    ind.style.height = pull + 'px';
    ind.classList.add('pulling');
    spinner.style.transform = 'rotate(' + (ratio * 240) + 'deg)';

    if (ratio >= 1) {
      ind.classList.add('ready');
      label.textContent = 'Bırak, yenile';
    } else {
      ind.classList.remove('ready');
      label.textContent = 'Yenilemek için çek…';
    }
  }, { passive: true });

  document.addEventListener('touchend', function(){
    if (!pulling) return;
    pulling = false;
    var dist = Math.max(0, currentY - startY);
    var pull = dist * 0.45;

    if (pull >= PTR_THRESHOLD) {
      doRefresh();
    } else {
      reset();
    }
    startY = 0; currentY = 0;
  });

  function doRefresh() {
    refreshing = true;
    ind.style.height = '';
    ind.classList.remove('pulling','ready');
    ind.classList.add('refreshing');
    label.textContent = 'Yenileniyor…';
    spinner.style.transform = '';

    // Sync or just reload local
    var done = function(){
      refreshing = false;
      ind.classList.remove('refreshing');
      ind.style.height = '0';
      ind.style.opacity = '0';
      setTimeout(function(){ ind.style.height = ''; ind.style.opacity = ''; }, 300);
      rebuildPoolFromEntries();
      renderAll();
      showToast('✓ Yenilendi');
    };

    if (currentUser && db) {
      syncFromFirebase().then(done).catch(done);
    } else {
      setTimeout(done, 600);
    }
  }

  function reset() {
    ind.style.height = '0';
    ind.style.opacity = '0';
    setTimeout(function(){
      ind.classList.remove('pulling','ready');
      ind.style.height = '';
      ind.style.opacity = '';
    }, 200);
  }
})();

// ── INIT ──
ensurePool();
rebuildPoolFromEntries();
renderAll();
switchTab('disease');
</script>
