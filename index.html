<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLog</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta name="theme-color" content="#c0392b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MedLog">
<link rel="apple-touch-icon" sizes="512x512" href="icon.png?v=2">
<link rel="icon" type="image/png" sizes="512x512" href="icon.png?v=2">
<link rel="shortcut icon" href="icon.png?v=2">
<style>
:root {
  --bg:#f0ece6; --surface:#faf8f5; --surface2:#e8e3db;
  --border:#e4ddd4; --border2:#cec4b8;
  --text:#1a1714; --text2:#5c524a; --text3:#9c8f84;
  --dis:#c0392b; --dis-bg:#fdf0ee; --dis-border:#f5c6c0;
  --fin:#1a6fa8; --fin-bg:#eaf3fb; --fin-border:#a8d0ed;
  --sym:#1a7a6e; --sym-bg:#e8f5f3; --sym-border:#a8d8d2;
  --radius:14px; --radius-sm:9px;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

header{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:56px;}
.logo-med{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--dis);flex-shrink:0;}
.logo-log{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--text);flex-shrink:0;}
.search-wrap{display:flex;align-items:center;gap:6px;flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;margin:0 12px;}
.search-wrap svg{flex-shrink:0;color:var(--text3);}
#searchInput{width:100%;background:transparent;border:none;font-family:'Nunito',sans-serif;font-size:16px;color:var(--text);outline:none;}

.hdr-btn{background:none;border:none;padding:0;margin:0;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;width:24px;height:24px;transition:opacity .15s;flex-shrink:0;}
.hdr-btn svg{width:20px;height:20px;}
.hdr-btn:hover{opacity:.55;}
.settings-btn{background:none;border:none;padding:0;margin:0;cursor:pointer;color:var(--text2);font-size:20px;display:flex;align-items:center;transition:opacity .15s;line-height:1;width:20px;height:20px;}
.settings-btn:hover{opacity:.6;}
.saving-dot{width:7px;height:7px;border-radius:50%;background:transparent;flex-shrink:0;transition:background .3s;}
.saving-dot.saving{background:#f39c12;animation:pulse .6s infinite;}
.saving-dot.saved{background:#27ae60;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.settings-panel{position:fixed;inset:0;z-index:300;display:none;}
.settings-panel.open{display:block;}
.s-backdrop{position:absolute;inset:0;background:rgba(26,23,20,.4);backdrop-filter:blur(2px);}
.s-drawer{position:absolute;top:0;right:0;bottom:0;width:min(340px,92vw);background:var(--surface);border-left:1.5px solid var(--border);display:flex;flex-direction:column;animation:drawerIn .22s ease;box-shadow:-4px 0 32px rgba(0,0,0,.1);}
@keyframes drawerIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.s-head{padding:18px 20px 14px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.s-head-title{font-family:'Lora',serif;font-size:17px;font-weight:600;}
.s-close{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;cursor:pointer;color:var(--text3);font-size:14px;transition:all .15s;}
.s-close:hover{background:var(--bg);}
.s-body{flex:1;overflow-y:auto;padding:10px 20px;}
.s-section{margin-bottom:12px;}

.s-section-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);font-family:'DM Mono',monospace;margin-bottom:10px;}
.auth-block{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;}
.auth-user-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.auth-avatar{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);object-fit:cover;flex-shrink:0;}
.auth-name{font-size:14px;font-weight:700;color:var(--text);}
.auth-email{font-size:12px;color:var(--text3);margin-left:6px;}
.auth-note{font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:10px;}
.sync-badge{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;margin-bottom:6px;width:100%;border:1.5px solid var(--border);box-sizing:border-box;}
.sync-badge.synced{background:#eafaf1;color:#1e8449;border:1.5px solid #a9dfbf;}
.sync-badge.local{background:#fff8e1;color:#856404;border:1.5px solid #ffc107;}
.sync-badge .dot{width:26px;height:26px;border-radius:50%;flex-shrink:0;}
.synced .dot{background:#27ae60;}
.local .dot{background:#f39c12;}
.s-btn{display:flex;align-items:center;gap:12px;width:100%;padding:11px 14px;border-radius:var(--radius-sm);cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;margin-bottom:6px;}
.s-btn:last-child{margin-bottom:0;}
.s-btn:hover{background:var(--bg);border-color:var(--border2);}
.s-btn.google{background:var(--surface);border-color:#a8c8f0;color:#333;}
.s-btn.google:hover{background:var(--bg);}
.s-btn.danger{color:var(--dis);}
.s-btn.danger:hover{background:var(--dis-bg);border-color:var(--dis-border);}
.s-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.s-icon svg{width:14px;height:14px;stroke:white;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.s-divider{height:1px;background:var(--border);margin:4px 0;}

.tab-nav{display:flex;background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 14px;position:sticky;top:56px;z-index:90;}
.tab-btn{padding:12px 16px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:color .15s;display:flex;align-items:center;justify-content:center;gap:6px;flex:1;}
.tab-btn .tab-dot{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0;vertical-align:middle;margin-bottom:1px;}
.tab-btn[data-tab="disease"]:hover,.tab-btn[data-tab="disease"].active{color:var(--dis);}
.tab-btn[data-tab="finding"]:hover,.tab-btn[data-tab="finding"].active{color:var(--fin);}
.tab-btn[data-tab="symptom"]:hover,.tab-btn[data-tab="symptom"].active{color:var(--sym);}
.tab-btn[data-tab="info"]:hover,.tab-btn[data-tab="info"].active{color:#b7860b;}
.tab-btn[data-tab="disease"].active{border-bottom-color:var(--dis);}
.tab-btn[data-tab="finding"].active{border-bottom-color:var(--fin);}
.tab-btn[data-tab="symptom"].active{border-bottom-color:var(--sym);}
.tab-btn[data-tab="info"].active{border-bottom-color:#b7860b;}

.add-entry-btn.info:hover{border-color:#b7860b;color:#b7860b;background:#fdf8ec;}

/* Info card */
.info-card .entry-header{border-left:3.5px solid #b7860b;}
.info-item-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.info-item-row:last-child{border-bottom:none;}
.info-item-dot{width:5px;height:5px;border-radius:50%;background:#b7860b;flex-shrink:0;margin-top:7px;}
.info-item-text{flex:1;font-size:14px;color:var(--text2);line-height:1.5;}
.info-item-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;padding:0;flex-shrink:0;margin-top:2px;transition:color .15s;}
.info-item-del:hover{color:var(--dis);}
.info-body-item{display:flex;align-items:flex-start;gap:8px;padding:7px 16px;transition:background .15s;}
.info-body-item:hover{background:var(--surface2);}
.info-body-dot{width:5px;height:5px;border-radius:50%;background:#b7860b;opacity:.7;flex-shrink:0;margin-top:7px;}
.info-body-text{flex:1;font-size:15px;color:var(--text2);line-height:1.5;}
.info-body-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;opacity:0;transition:opacity .15s,color .15s;padding:0 2px;line-height:1;flex-shrink:0;margin-top:2px;}
.info-body-item:hover .info-body-del{opacity:1;}
.info-body-del:hover{color:var(--dis);}

/* Info card grup yapısı */
.info-grup{border:1.5px solid #e8d5a3;border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;background:#fdf9f0;}
.info-grup-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.info-grup-title{flex:1;border:none;border-bottom:1.5px solid #e8d5a3;background:transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:#b7860b;padding:2px 4px;outline:none;}
.info-grup-title::placeholder{color:#e8d5a3;font-weight:400;}
.info-grup-del{background:none;border:none;cursor:pointer;color:#e8d5a3;font-size:16px;padding:0;line-height:1;transition:color .15s;}
.info-grup-del:hover{color:var(--dis);}
.info-grup-madde-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.info-grup-madde-text{flex:1;font-size:13px;color:var(--text2);}
.info-grup-madde-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0;transition:color .15s;}
.info-grup-madde-del:hover{color:var(--dis);}
.info-grup-madde-input{display:flex;gap:6px;margin-top:6px;margin-left:32px;}
.info-grup-madde-input input{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;font-family:'Nunito',sans-serif;font-size:16px;color:var(--text);background:var(--surface);outline:none;}
.info-grup-madde-input input:focus{border-color:#b7860b;}

/* Pool drawer */
.pool-drawer-overlay{position:fixed;inset:0;background:rgba(26,23,20,.45);z-index:400;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
.pool-drawer-overlay.open{display:flex;}
@media(min-width:600px){.pool-drawer-overlay{align-items:center;}}
.pool-drawer{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:560px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 -4px 32px rgba(0,0,0,.12);animation:slideUp .22s ease;}
@media(min-width:600px){.pool-drawer{border-radius:var(--radius);max-height:78vh;}}
.pool-drawer-head{padding:16px 20px 12px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.pool-drawer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pool-drawer-title{font-family:'Lora',serif;font-size:16px;font-weight:600;flex:1;}
.pool-drawer-count{font-size:11px;font-weight:800;font-family:'DM Mono',monospace;color:var(--text3);margin-right:6px;}
.pool-drawer-close{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;cursor:pointer;color:var(--text3);font-size:14px;transition:all .15s;}
.pool-drawer-close:hover{background:var(--bg);}
.pool-drawer-body{flex:1;overflow-y:auto;padding:14px 20px;}
.pool-drawer-search{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-family:'Nunito',sans-serif;font-size:16px;color:var(--text);background:var(--surface2);outline:none;margin-bottom:12px;transition:border-color .2s;}
.pool-drawer-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;min-height:20px;}
.pool-drawer-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px 5px 12px;border-radius:14px;font-size:13px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);}
.pool-drawer-chip span{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pool-drawer-chip button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;padding:0 0 0 2px;flex-shrink:0;transition:color .15s;}
.pool-drawer-chip button:hover{color:var(--dis);}
.pool-drawer-empty{font-size:13px;color:var(--text3);font-style:italic;padding:4px 0 14px;}
.pool-drawer-add{display:flex;gap:8px;border-top:1px solid var(--border);padding-top:12px;}
.pool-drawer-input{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-family:'Nunito',sans-serif;font-size:16px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .2s;}
.pool-drawer-btn{border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;color:white;white-space:nowrap;transition:opacity .15s;}
.pool-drawer-btn:hover{opacity:.85;}

.app{max-width:820px;margin:0 auto;padding:20px 14px 80px;}
.tab-panel{display:none;}.tab-panel.active{display:block;}
#searchView{display:none;}#searchView.active{display:block;}
#mainView.hidden{display:none;}


.add-entry-btn{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px dashed var(--border2);border-radius:var(--radius);padding:13px 16px;margin-bottom:14px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--text3);transition:all .15s;width:100%;}
.add-entry-btn.disease:hover{border-color:var(--dis);color:var(--dis);background:var(--dis-bg);}
.add-entry-btn.finding:hover{border-color:var(--fin);color:var(--fin);background:var(--fin-bg);}
.add-entry-btn.symptom:hover{border-color:var(--sym);color:var(--sym);background:var(--sym-bg);}

.sec-stats{font-size:12px;color:var(--text3);font-weight:700;margin-bottom:12px;}
.sec-stats strong{color:var(--text2);}

.entry-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .3s,border-color .3s;}
.entry-header{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .15s;}
.entry-header:hover{background:var(--surface2);}
.e-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.disease .e-dot{background:var(--dis);}
.finding .e-dot{background:var(--fin);}
.symptom .e-dot{background:var(--sym);}
.e-title{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--text);flex:1;}
.e-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;opacity:0;transition:opacity .15s,color .15s;padding:2px 4px;}
.entry-header:hover .e-del{opacity:1;}
.e-del:hover{color:var(--dis);}
.chevron{color:var(--text3);transition:transform .2s;font-size:11px;flex-shrink:0;}
.entry-card.open .chevron{transform:rotate(180deg);}
.entry-body{display:none;border-top:1.5px solid var(--border);}
.entry-card.open .entry-body{display:block;}

.field-section{border-bottom:1px solid var(--border);}
.field-section:last-child{border-bottom:none;}
.field-header{padding:10px 16px 6px;}
.field-label{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;font-family:'DM Mono',monospace;}
.item-row{display:flex;align-items:flex-start;gap:8px;padding:7px 16px 7px 32px;transition:background .15s;}
.item-row:hover{background:var(--surface2);}
.i-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:7px;opacity:.4;background:var(--text2);}
.i-text{flex:1;font-size:15px;color:var(--text2);line-height:1.5;}
.i-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;opacity:0;transition:opacity .15s,color .15s;padding:0 2px;line-height:1;flex-shrink:0;margin-top:2px;}
.item-row:hover .i-del{opacity:1;}
.i-del:hover{color:var(--dis);}

.overlay{display:none;position:fixed;inset:0;background:rgba(26,23,20,.45);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
.overlay.open{display:flex;}
@media(min-width:600px){.overlay{align-items:center;}}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 -4px 32px rgba(0,0,0,.12);animation:slideUp .22s ease;}
@media(min-width:600px){.modal{border-radius:var(--radius);max-height:85vh;}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-header{padding:18px 20px 14px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.modal-header-title{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--text);flex:1;}
.modal-close{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;cursor:pointer;color:var(--text3);font-size:14px;transition:all .15s;}
.modal-close:hover{background:var(--bg);}
.modal-body{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:16px;}
.mfield label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;margin-bottom:6px;}
.mfield-tanim label{color:var(--text3);}
.mfield-sorgu label{color:#8e44ad;}
.mfield-tetkik label{color:#d35400;}
.mfield-notlar label{color:#1a7a6e;}
.mfield-tedavi label{color:#1a6fa8;}
.tedavi-grup{border:1.5px solid #a8d0ed;border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;background:#f5faff;}
.tedavi-grup-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.tedavi-grup-title{flex:1;border:none;border-bottom:1.5px solid #a8d0ed;background:transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:#1a6fa8;padding:2px 4px;outline:none;}
.tedavi-grup-title::placeholder{color:#a8d0ed;font-weight:400;}
.tedavi-grup-del{background:none;border:none;cursor:pointer;color:#a8d0ed;font-size:16px;padding:0;line-height:1;transition:color .15s;}
.tedavi-grup-del:hover{color:var(--dis);}
.tedavi-madde-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.tedavi-madde-text{flex:1;font-size:13px;color:var(--text2);}
.tedavi-madde-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0;transition:color .15s;}
.tedavi-madde-del:hover{color:var(--dis);}
.tedavi-madde-input{display:flex;gap:6px;margin-top:6px;margin-left:32px;}
.tedavi-madde-input input{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;font-size:16px;}
.tedavi-madde-input input:focus{border-color:#1a6fa8;}
.mfield-bulgu label{color:#1a7a6e;}
.bulgu-grup{border:1.5px solid #a8d8d2;border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;background:#f0faf9;}
.bulgu-grup-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bulgu-grup-title{flex:1;border:none;border-bottom:1.5px solid #a8d8d2;background:transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:#1a7a6e;padding:2px 4px;outline:none;}
.bulgu-grup-title::placeholder{color:#a8d8d2;font-weight:400;}
.bulgu-grup-del{background:none;border:none;cursor:pointer;color:#a8d8d2;font-size:16px;padding:0;line-height:1;transition:color .15s;}
.bulgu-grup-del:hover{color:var(--dis);}
.bulgu-madde-input{display:flex;gap:6px;margin-top:6px;margin-left:32px;}
.bulgu-madde-input input{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;font-family:'Nunito',sans-serif;font-size:16px;color:var(--text);background:var(--surface);outline:none;}
.bulgu-madde-input input:focus{border-color:#1a7a6e;}
.mfield input, .mfield-input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-family:'Nunito',sans-serif;font-size:16px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .2s,box-shadow .2s;}
.mfield input:focus{border-color:var(--dis);box-shadow:0 0 0 3px var(--dis-bg);}
.mfield input::placeholder{color:var(--text3);}
.modal-footer{padding:14px 20px;border-top:1.5px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.btn-cancel{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 18px;cursor:pointer;color:var(--text2);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;transition:all .15s;}
.btn-cancel:hover{background:var(--bg);}
.btn-save{border:none;border-radius:var(--radius-sm);padding:9px 24px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;color:white;margin-left:auto;transition:opacity .15s;}
.btn-save:hover{opacity:.85;}
.btn-save.disease{background:var(--dis);}
.btn-save.finding{background:var(--fin);}
.btn-save.symptom{background:var(--sym);}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}

.search-result{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:border-color .15s;}
.search-result:hover{border-color:var(--border2);}
.sr-header{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--border);}
.sr-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.4px;}
.sr-badge.disease{background:var(--dis-bg);color:var(--dis);}
.sr-badge.finding{background:var(--fin-bg);color:var(--fin);}
.sr-badge.symptom{background:var(--sym-bg);color:var(--sym);}
.sr-badge.info{background:#fdf6e3;color:#b7860b;}
.sr-title{font-family:'Lora',serif;font-size:15px;font-weight:600;flex:1;}
.sr-goto{font-size:11px;color:var(--text3);font-weight:700;opacity:0;transition:opacity .15s;white-space:nowrap;}
.search-result:hover .sr-goto{opacity:1;}
.sr-field{padding:8px 16px;border-bottom:1px solid var(--border);}
.sr-field:last-child{border-bottom:none;}
.sr-field-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;margin-bottom:4px;}
.sr-field-label.tanim{color:var(--text3);}
.sr-field-label.sorgu{color:#8e44ad;}
.sr-field-label.tetkik{color:#d35400;}
.sr-field-label.notlar{color:#1a7a6e;}
.sr-item{font-size:14px;color:var(--text2);padding:2px 0 2px 10px;}
mark{background:#ffeaa7;border-radius:3px;padding:0 2px;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-state .ei{font-size:44px;margin-bottom:12px;}
.empty-state h3{font-family:'Lora',serif;font-size:17px;color:var(--text2);margin-bottom:6px;}
.empty-state p{font-size:14px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1714;color:white;padding:9px 20px;border-radius:24px;font-size:13px;font-weight:700;z-index:999;transition:transform .3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Confirm dialog */
.confirm-overlay{position:fixed;inset:0;background:rgba(26,23,20,.45);z-index:600;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.confirm-overlay.open{display:flex;}
.confirm-box{background:var(--surface);border-radius:var(--radius);padding:24px 20px 16px;width:min(320px,88vw);box-shadow:0 8px 40px rgba(0,0,0,.18);animation:slideUp .18s ease;}
.confirm-msg{font-size:15px;color:var(--text);line-height:1.5;margin-bottom:18px;text-align:center;}
.confirm-btns{display:flex;gap:8px;justify-content:flex-end;}
.confirm-cancel{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text2);transition:all .15s;}
.confirm-cancel:hover{background:var(--bg);}
.confirm-ok{border:none;border-radius:var(--radius-sm);padding:8px 18px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:white;background:var(--dis);transition:opacity .15s;}
.confirm-ok:hover{opacity:.85;}

/* ── AUTOCOMPLETE ── */
.ac-wrap{position:relative;}
.ac-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius-sm);box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:500;max-height:200px;overflow-y:auto;display:none;}
.ac-dropdown.open{display:block;}
.ac-item{padding:8px 12px;font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s;}
.ac-item:hover,.ac-item.focused{background:var(--bg);}
.ac-item .ac-icon{font-size:10px;opacity:.4;flex-shrink:0;}
.ac-item mark{background:#ffeaa7;border-radius:2px;padding:0 2px;}
.ac-empty{padding:8px 12px;font-size:12px;color:var(--text3);font-style:italic;}
.ac-new-hint{padding:6px 12px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);background:var(--surface2);}
.ac-new-hint span{font-weight:700;color:var(--text2);}
.pool-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px;background:var(--bg);color:var(--text3);font-family:'DM Mono',monospace;border:1px solid var(--border);margin-left:auto;flex-shrink:0;}
.pool-stats{font-size:11px;color:var(--text3);margin-top:4px;}

@media(max-width:480px){
  .tab-btn{padding:12px 10px;font-size:13px;}
  .tab-btn .lbl{display:none;}
}

/* ── EXPORT ── */
.s-chip{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:4px 8px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--text2);background:var(--surface);cursor:pointer;transition:all .15s;white-space:nowrap;}
.s-chip.active{border-color:var(--dis);background:var(--dis-bg);color:var(--dis);}
.s-chip:hover:not(.active){background:var(--bg);}
.s-row-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:6px;}

/* Çöp kutusu */
.trash-item{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.trash-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.trash-item-info{flex:1;min-width:0;}
.trash-item-title{font-family:'Lora',serif;font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.trash-item-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}
.trash-item-restore{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--text2);transition:all .15s;white-space:nowrap;flex-shrink:0;}
.trash-item-restore:hover{background:#eafaf1;border-color:#a9dfbf;color:#1e8449;}
.trash-item-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:17px;line-height:1;padding:2px 4px;flex-shrink:0;transition:color .15s;}
.trash-item-del:hover{color:var(--dis);}

@media print {
  body * { visibility: hidden !important; }
  #printArea, #printArea * { visibility: visible !important; }
  #printArea { position: fixed !important; top: 0; left: 0; width: 100%; display: block !important; }
  @page { margin: 20mm; size: A4; }
}
#printArea { display: none; }
.fab{position:fixed;bottom:28px;right:20px;z-index:250;width:52px;height:52px;border-radius:50%;background:var(--dis);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(192,57,43,.35);transition:transform .15s,box-shadow .15s;}
.fab:hover{transform:scale(1.07);box-shadow:0 6px 24px rgba(192,57,43,.45);}
.fab:active{transform:scale(.95);}
.fab svg{width:22px;height:22px;stroke:white;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}



#ptr-indicator{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:10px;
  height:0;overflow:hidden;
  background:var(--surface);
  border-bottom:1.5px solid var(--border);
  z-index:150;
  opacity:0;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text3);
}
#ptr-indicator.pulling{opacity:1;}
#ptr-indicator.ready{color:var(--dis);}
#ptr-indicator.refreshing{
  height:52px;opacity:1;
  transition:height .25s ease, opacity .2s ease;
}
.ptr-spinner{
  width:18px;height:18px;
  border:2.5px solid var(--border2);
  border-top-color:var(--dis);
  border-radius:50%;
  flex-shrink:0;
}
#ptr-indicator.refreshing .ptr-spinner{
  animation:ptr-spin .7s linear infinite;
}
@keyframes ptr-spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="ptr-indicator">
  <div class="ptr-spinner" id="ptr-spinner"></div>
  <span id="ptr-label">Yenilemek için çek…</span>
</div>

<div id="appScreen">
  <header>
    <span class="logo-med">Med</span>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" type="search" placeholder="Ara…" autocomplete="off">

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="disease" onclick="switchTab('disease')"><span class="tab-dot" style="background:var(--dis)"></span> <span class="lbl">Hastalık</span></button>
    <button class="tab-btn" data-tab="finding" onclick="switchTab('finding')"><span class="tab-dot" style="background:var(--fin)"></span> <span class="lbl">Bulgu</span></button>
    <button class="tab-btn" data-tab="symptom" onclick="switchTab('symptom')"><span class="tab-dot" style="background:var(--sym)"></span> <span class="lbl">Belirti</span></button>
    <button class="tab-btn" data-tab="info" onclick="switchTab('info')"><span class="tab-dot" style="background:#b7860b"></span> <span class="lbl">Bilgi</span></button>
  </nav>

  <div class="app">
    <div id="searchView">
      <div class="sec-stats" id="searchStats"></div>
      <div id="searchResults"></div>
    </div>
    <div id="mainView">
      <div class="tab-panel active" id="panel-disease">
        <button class="add-entry-btn disease" onclick="openModal('disease')"><span style="font-size:18px">+</span> Yeni hastalık ekle</button>
        <div class="sec-stats" id="stats-disease"></div>
        <div id="list-disease"></div>
      </div>
      <div class="tab-panel" id="panel-finding">
        <button class="add-entry-btn finding" onclick="openModal('finding')"><span style="font-size:18px">+</span> Yeni bulgu ekle</button>

        <div id="list-finding"></div>
      </div>
      <div class="tab-panel" id="panel-symptom">

        <div id="list-symptom"></div>
      </div>
      <div class="tab-panel" id="panel-info">
        <button class="add-entry-btn info" onclick="openInfoModal()"><span style="font-size:18px">+</span> Yeni bilgi kartı ekle</button>
        <div class="sec-stats" id="stats-info"></div>
        <div id="list-info"></div>
      </div>
    </div>
  </div>
</div>



<button class="fab" id="fabBtn" onclick="openSettings()" title="Ayarlar">
  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
</button>



<!-- SETTINGS -->
<div class="settings-panel" id="settingsPanel">
  <div class="s-backdrop" onclick="closeSettings()"></div>
  <div class="s-drawer">
    <div class="s-head">
      <span class="s-head-title">Ayarlar</span>
      <div class="saving-dot" id="savingDot" style="margin-left:auto;margin-right:10px"></div>
      <button class="s-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="s-body" style="padding:10px 16px 32px;">
        <div id="authLoggedOut">
          <div class="sync-badge local"><span class="dot"></span> Yerel kayıt (sadece bu cihaz)</div>
          <button class="s-btn google" onclick="signInWithGoogle()">
            <svg width="26" height="26" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Google ile giriş yap
          </button>
        </div>
        <div id="authLoggedIn" style="display:none">
          <div class="auth-user-row s-btn" style="cursor:default;">

            <div style="display:flex;align-items:baseline;flex:1;overflow:hidden;">

              <div class="auth-email" id="authEmail"></div>
            </div>
          </div>

          <button class="s-btn" id="manualSyncBtn" onclick="manualSync()" style="border-color:#a8d0ed;"><span class="s-icon" style="background:#1a6fa8"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></span>Şimdi senkronize et</button>
          <button class="s-btn danger" onclick="doSignOut()" style="border-color:#f5c6c0;"><span class="s-icon" style="background:#c0392b"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>Çıkış yap</button>
        </div>
        <div style="height:1px;background:var(--border);margin:8px 0;"></div>
        <button class="s-btn" onclick="showStatsInSettings()" style="border-color:#a8d0ed;"><span class="s-icon" style="background:#1a6fa8"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>İstatistikler</button>
        <div id="statsBody" style="display:none;margin-bottom:5px;"></div>
        <button class="s-btn" onclick="closeSettings();openPoolViewer()" style="border-color:#f0b27a;"><span class="s-icon" style="background:#d35400"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>Madde havuzu</button>
        <button class="s-btn" onclick="exportData()" style="border-color:#a8d8d2;"><span class="s-icon" style="background:#1a7a6e"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>Dışa aktar (JSON)</button>
        <button class="s-btn" onclick="document.getElementById('importFile').click()" style="border-color:#c39bd3;"><span class="s-icon" style="background:#8e44ad"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span>İçe aktar (JSON)</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">

          <button class="s-chip" id="escope-disease" onclick="setExportScope('disease')" style="flex:1;padding:4px 2px;font-size:11px;text-align:center;">Hastalık</button>
          <button class="s-chip" id="escope-finding" onclick="setExportScope('finding')" style="flex:1;padding:4px 2px;font-size:11px;text-align:center;">Bulgu</button>
          <button class="s-chip" id="escope-symptom" onclick="setExportScope('symptom')" style="flex:1;padding:4px 2px;font-size:11px;text-align:center;">Belirti</button>
          <button class="s-chip" id="escope-info" onclick="setExportScope('info')" style="flex:1;padding:4px 2px;font-size:11px;text-align:center;">Bilgi</button>
        </div>

          <button class="s-chip active" id="efmt-pdf" onclick="setExportFormat('pdf')" style="flex:1;padding:4px 2px;font-size:11px;text-align:center;">PDF</button>
          <button class="s-chip" id="efmt-doc" onclick="setExportFormat('doc')" style="flex:1;padding:4px 2px;font-size:11px;text-align:center;">Word</button>
          <button class="s-chip" id="efmt-txt" onclick="setExportFormat('txt')" style="flex:1;padding:4px 2px;font-size:11px;text-align:center;">TXT</button>
        </div>
        <button class="s-btn" onclick="doExport()" style="background:var(--dis);color:white;border-color:var(--dis);">Belge indir</button>
        <div style="height:1px;background:var(--border);margin:8px 0;"></div>
        <button class="s-btn" onclick="openTrash();closeSettings();" style="border-color:#cec4b8;"><span class="s-icon" style="background:#5c524a"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></span>Çöp kutusu <span id="trash-badge" style="margin-left:auto;font-size:10px;font-weight:800;font-family:'DM Mono',monospace;color:var(--text3);"></span></button>
        <button class="s-btn danger" onclick="clearAllData()" style="border-color:#f5c6c0;"><span class="s-icon" style="background:#c0392b"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></span>Tüm verileri sil</button>
        <div style="margin-top:12px;font-size:11px;color:var(--text3);text-align:center;">MedLog @ iclalcakir</div>
    </div>
  </div>
</div>
<!-- ENTRY MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-header-title" id="modalTitle">Yeni Giriş</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="mfield">
        <label>📌 Başlık</label>
        <input id="m-title" type="text" placeholder="Giriş başlığı…" autocomplete="off" autocorrect="off" autocapitalize="off" data-lpignore="true" data-1p-ignore>

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ── CONSTANTS ──
const LABELS = { disease:'Hastalık', finding:'Bulgu', symptom:'Belirti', info:'Bilgi' };
const FIELD_LABELS = { tanim:'Tanım', sorgu:'Sorgu', bulgu:'Bulgu & Belirti', tetkik:'Tetkik', tedavi:'Tedavi', notlar:'Notlar' };
const FIELDS = ['tanim','sorgu','bulgu','tetkik','tedavi','notlar'];
const FIELD_COLORS = { tanim:'var(--text3)', sorgu:'#8e44ad', bulgu:'#1a7a6e', tetkik:'#d35400', tedavi:'#1a6fa8', notlar:'#1a7a6e' };
const STORAGE_KEY = 'medlog_local';

// ── STATE ──
let localDb = loadLocal();
let currentUser = null;
let saveTimeout = null;
let modalType = 'disease';
var modalItems = { tanim:[], sorgu:[], bulgu:[], tetkik:[], tedavi:[], notlar:[] };
// tedavi formatı: [{ baslik: string, maddeler: string[] }, ...]
let editingId = null;
let searchQuery = '';

// ── LOCAL STORAGE ──
function loadLocal() {
  try {
    var data = localStorage.getItem(STORAGE_KEY);
    if (data) return JSON.parse(data) || emptyDb();
    var sess = sessionStorage.getItem(STORAGE_KEY);
    if (sess) return JSON.parse(sess) || emptyDb();
    return emptyDb();
  } catch(e) { return emptyDb(); }
}
function emptyDb() { return { disease:[], finding:[], symptom:[], info:[], trash:[], pool:{ tanim:[], sorgu:[], bulgu:[], tetkik:[], tedavi:[], notlar:[] } }; }
function ensureTrash() { if (!Array.isArray(localDb.trash)) localDb.trash = []; }

function ensurePool() {
  if (!localDb.pool) localDb.pool = { tanim:[], sorgu:[], bulgu:[], tetkik:[], tedavi:[], notlar:[] };
  FIELDS.forEach(function(f){ if (!Array.isArray(localDb.pool[f])) localDb.pool[f] = []; });
}

// Havuzu mevcut tüm kartlardan sıfırdan oluştur (additive değil, exact)
function rebuildPoolFromEntries() {
  ensurePool();
  FIELDS.forEach(function(field) {
    var seen = new Map();
    ['disease','finding','symptom'].forEach(function(type) {
      (localDb[type]||[]).forEach(function(entry) {
        if (field === 'tedavi') {
          migrateTedavi(entry.tedavi).forEach(function(g) {
            (g.maddeler||[]).forEach(function(item) {
              if (item && item.trim()) seen.set(item.trim().toLowerCase(), item.trim());
            });
          });
        } else if (field === 'bulgu') {
          migrateBulgu(entry.bulgu).forEach(function(g) {
            (g.maddeler||[]).forEach(function(item) {
              if (item && item.trim()) seen.set(item.trim().toLowerCase(), item.trim());
            });
          });
        } else {
          (entry[field]||[]).forEach(function(item) {
            if (item && typeof item === 'string' && item.trim()) seen.set(item.trim().toLowerCase(), item.trim());
          });
        }
      });
    });
    if (field === 'notlar') {
      (localDb.info||[]).forEach(function(entry) {
        migrateInfoItems(entry.items||[]).forEach(function(grup) {
          (grup.maddeler||[]).forEach(function(item) {
            if (item && item.trim()) seen.set(item.trim().toLowerCase(), item.trim());
          });
        });
      });
    }
    localDb.pool[field] = Array.from(seen.values());
  });
}

// addToPool kaldırıldı — rebuildPoolFromEntries() her zaman pool'u sıfırdan inşa eder,
// dolayısıyla ayrıca addToPool çağırmak gereksizdi.

function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(localDb)); } catch(e) {}
  try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(localDb)); } catch(e) {}
  if (typeof updateTrashBadge === 'function') updateTrashBadge();
}

// ── FIREBASE ──
// ⚠️  GÜVENLİK NOTU: Bu yapılandırma public kaynak kodunda görünür durumdadır.
// Firebase client config'i gizlemek mümkün değildir — güvenlik tamamen
// Firestore Security Rules üzerinden sağlanmalıdır.
// Aktif kural (Firebase Console → Firestore → Rules):
//
//   rules_version = '2';
//   service cloud.firestore {
//     match /databases/{database}/documents {
//       match /users/{userId}/{document=**} {
//         allow read, write: if request.auth != null && request.auth.uid == userId;
//       }
//     }
//   }
//
// Bu kural ile yalnızca oturum açmış kullanıcı kendi verisine erişebilir. ✓
const firebaseConfig = {
  apiKey: "AIzaSyB9TXfNcr98GXJmBMluEAuu-_AEp7Skh6k",
  authDomain: "iclalcakirmedlog.firebaseapp.com",
  projectId: "iclalcakirmedlog",
  storageBucket: "iclalcakirmedlog.firebasestorage.app",
  messagingSenderId: "764365188219",
  appId: "1:764365188219:web:0d814daa98767f2ead46de",
  measurementId: "G-CRP3Z963MJ"
};

let auth, db;
try {
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();

  // Redirect sonrası geri dönüşü yakala
  auth.getRedirectResult().then(function(result) {
    if (result && result.user) {
      showToast('✓ Giriş başarılı');
    }
  }).catch(function(e) {
    if (e.code && e.code !== 'auth/no-auth-event') {
      showToast('❌ Giriş hatası: ' + e.code);
      console.error(e);
    }
  });

  auth.onAuthStateChanged(async function(user) {
    if (user) {
      currentUser = user;
      try {
        await syncFromFirebase();
      } catch(e) {
        console.error('Sync on auth change failed:', e);
        showToast('⚠️ Senkronizasyon başarısız, yerel veri kullanılıyor');
      }
      updateAuthUI(true, user);
      renderAll();
    } else {
      currentUser = null;
      updateAuthUI(false, null);
      renderAll();
    }
  });
} catch(e) { /* Firebase yüklenemedi, yerel mod aktif */ }

// ── FIRESTORE ──
function userDocRef() {
  // Path: users/{uid}/data/medlog — kuralımız users/{userId}/{document=**} ile uyumlu
  return db.collection('users').doc(currentUser.uid).collection('data').doc('medlog');
}

async function syncFromFirebase() {
  try {
    const snap = await userDocRef().get();
    if (snap.exists) {
      const remote = snap.data();
      const localTime = localDb._savedAt || 0;
      const remoteTime = remote._savedAt || 0;

      if (remoteTime > localTime) {
        // Firebase daha yeni — Firebase'i al
        localDb = remote;
        ensurePool();
      }
      // localTime >= remoteTime ise local daha yeni — local'i Firebase'e yaz
    }
    rebuildPoolFromEntries();
    localDb._savedAt = Date.now();
    await userDocRef().set(localDb);
    saveLocal();
    renderAll();
  } catch(e) { console.error('Sync error:', e); }
}

async function manualSync() {
  if (!currentUser || !db) { showToast('⚠️ Giriş yapılmamış'); return; }
  const btn = document.getElementById('manualSyncBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Senkronize ediliyor…'; }
  try {
    await syncFromFirebase();
    showToast('✓ Senkronizasyon tamamlandı');
  } catch(e) {
    showToast('❌ Senkronizasyon başarısız');
    console.error(e);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔄 Şimdi senkronize et'; }
  }
}

async function saveToFirebase() {
  if (!currentUser || !db) return;
  try {
    await userDocRef().set(localDb);
    saveLocal();
    setSaving(false, true);
  } catch(e) {
    console.error('Firebase save error:', e);
    setSaving(false, false);
  }
}

function scheduleSave() {
  rebuildPoolFromEntries();
  localDb._savedAt = Date.now();
  setSaving(true);
  saveLocal();
  if (!currentUser || !db) { setSaving(false, true); return; }
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async function() {
    try {
      await userDocRef().set(localDb);
      setSaving(false, true);
    } catch(e) {
      console.error('Save error:', e);
      showToast('❌ Firebase kayıt hatası');
      setSaving(false, false);
    }
  }, 800);
}

function setSaving(saving, success) {
  const dot = document.getElementById('savingDot');
  if (!dot) return;
  if (saving) { dot.className = 'saving-dot saving'; }
  else if (success) { dot.className = 'saving-dot saved'; setTimeout(function(){ dot.className = 'saving-dot'; }, 2000); }
  else { dot.className = 'saving-dot'; }
}

function updateAuthUI(loggedIn, user) {
  document.getElementById('authLoggedOut').style.display = loggedIn ? 'none' : 'block';
  document.getElementById('authLoggedIn').style.display = loggedIn ? 'block' : 'none';
  if (loggedIn && user) {
    document.getElementById('authAvatar').src = user.photoURL || '';
    document.getElementById('authName').textContent = user.displayName || '';
    document.getElementById('authEmail').textContent = user.email || '';
  }
}

function signInWithGoogle() {
  if (!auth) { showToast('Firebase bağlantısı yok'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });
  auth.signInWithPopup(provider).then(function(result) {
    if (result.user) showToast('✓ Giriş başarılı');
  }).catch(function(e) {
    console.error('Popup auth error:', e.code, e.message);
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      // Popup engellenirse redirect'e geç
      auth.signInWithRedirect(provider).catch(function(e2) {
        showToast('❌ Giriş başarısız: ' + e2.message); console.error(e2);
      });
    } else {
      showToast('❌ Giriş başarısız: ' + e.code);
    }
  });
}

function doSignOut() {
  if (!auth) return;
  auth.signOut().then(function() { showToast('👋 Çıkış yapıldı'); closeSettings(); });
}

// ── SETTINGS ──
function openSettings() {
  document.getElementById('settingsPanel').classList.add('open');
}
function closeSettings() { document.getElementById('settingsPanel').classList.remove('open'); }

// ── TAB ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab === tab); });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.toggle('active', p.id === 'panel-' + tab); });
  document.querySelectorAll('.entry-card.open').forEach(function(c){ c.classList.remove('open'); });
  if (tab === 'info') renderInfoList();
}

// ── MODAL ──
function migrateTedavi(raw) {
  if (!raw || !raw.length) return [];
  if (typeof raw[0] === 'object' && raw[0] !== null && 'maddeler' in raw[0]) return raw.map(function(g){ return { baslik: g.baslik||'', maddeler: (g.maddeler||[]).slice() }; });
  return [{ baslik: '', maddeler: raw.slice() }];
}

function openModal(type, entryId) {
  modalType = type;
  editingId = entryId || null;
  modalItems = { tanim:[], sorgu:[], bulgu:[], tetkik:[], tedavi:[], notlar:[] };
  if (entryId) {
    const entry = localDb[type].find(function(e){ return e.id === entryId; });
    if (entry) {
      document.getElementById('m-title').value = entry.title;
      ['tanim','sorgu','tetkik','notlar'].forEach(function(f){ modalItems[f] = (entry[f]||[]).slice(); });
      modalItems.tedavi = migrateTedavi(entry.tedavi);
      modalItems.bulgu = migrateBulgu(entry.bulgu);
      document.getElementById('modalTitle').textContent = entry.title + ' — Düzenle';
    }
  } else {
    document.getElementById('m-title').value = '';
    ['tanim','sorgu','tetkik','notlar'].forEach(function(f){ modalItems[f] = []; });
    modalItems.tedavi = [];
    modalItems.bulgu = [];
    document.getElementById('modalTitle').textContent = 'Yeni ' + LABELS[type];
  }
  var tedaviField = document.querySelector('.mfield-tedavi');
  var bulguField = document.querySelector('.mfield-bulgu');
  if (tedaviField) tedaviField.style.display = type === 'disease' ? '' : 'none';
  if (bulguField) bulguField.style.display = type === 'disease' ? '' : 'none';
  document.getElementById('modalSaveBtn').className = 'btn-save ' + type;
  renderModalItems();
  updatePoolBadges();
  document.getElementById('overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('m-title').focus(); }, 100);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}

function addModalItem(field, value) {
  const inp = document.getElementById('m-' + field + '-new');
  const val = (value !== undefined ? value : inp.value).trim();
  if (!val) return;
  if (modalItems[field].some(function(x){ return x.toLowerCase() === val.toLowerCase(); })) {
    showToast('Bu madde zaten eklendi'); return;
  }
  modalItems[field].push(val);
  inp.value = '';
  acClose(field);
  renderModalItems();
  updatePoolBadges();
  inp.focus();
}

// ── BULGU & BELİRTİ GRUP ──
function migrateBulgu(raw) {
  if (!raw || !raw.length) return [];
  if (typeof raw[0] === 'object' && raw[0] !== null && 'maddeler' in raw[0]) return raw.map(function(g){ return { baslik: g.baslik||'', maddeler: (g.maddeler||[]).slice() }; });
  return [{ baslik: '', maddeler: raw.slice() }];
}

function updateBulguBaslik(gi, val) {
  if (modalItems.bulgu[gi]) modalItems.bulgu[gi].baslik = val;
}

function addBulguGrup() {
  modalItems.bulgu.push({ baslik: '', maddeler: [] });
  renderBulguGruplari();
  setTimeout(function(){
    var inputs = document.querySelectorAll('.bulgu-grup-title');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function deleteBulguGrup(gi) {
  modalItems.bulgu.splice(gi, 1);
  renderBulguGruplari();
}

function addBulguMadde(gi) {
  var inp = document.getElementById('bulgu-inp-' + gi);
  if (!inp) return;
  var val = inp.value.trim();
  if (!val) return;
  modalItems.bulgu[gi].maddeler.push(val);
  inp.value = '';
  renderBulguGruplari();
  setTimeout(function(){ var i = document.getElementById('bulgu-inp-' + gi); if(i) i.focus(); }, 50);
}

function deleteBulguMadde(gi, mi) {
  modalItems.bulgu[gi].maddeler.splice(mi, 1);
  renderBulguGruplari();
}

function editBulguMadde(gi, mi, el) {
  var current = modalItems.bulgu[gi].maddeler[mi];
  startInlineEdit(el, current, '#1a7a6e', function(val) {
    if (val) modalItems.bulgu[gi].maddeler[mi] = val;
    renderBulguGruplari();
  });
}

function renderBulguGruplari() {
  var container = document.getElementById('items-bulgu');
  if (!container) return;
  if (!modalItems.bulgu.length) { container.innerHTML = ''; return; }

// ── MODAL ITEMS RENDER ──
var acFocusIdx = { tanim:-1, sorgu:-1, bulgu:-1, tetkik:-1, tedavi:-1, notlar:-1 };

function acGetSuggestions(field, query) {
  ensurePool();
  const pool = localDb.pool[field] || [];
  const q = query.toLowerCase().trim();
  const alreadyAdded = new Set(modalItems[field].map(function(x){ return x.toLowerCase(); }));
  if (!q) {
    // Boşken tüm havuzu göster (eklenmemişleri)
    return pool.filter(function(x){ return !alreadyAdded.has(x.toLowerCase()); }).slice(0, 10);
  }
  return pool.filter(function(x){
    return x.toLowerCase().includes(q) && !alreadyAdded.has(x.toLowerCase());
  }).slice(0, 10);
}

function acInput(field) {
  var inp = document.getElementById('m-' + field + '-new');
  var q = inp.value.trim();
  var suggestions = acGetSuggestions(field, q);
  acFocusIdx[field] = -1;
  renderAcDropdown(field, q, suggestions);
}

function renderAcDropdown(field, q, suggestions) {
  var dd = document.getElementById('ac-' + field);
  if (!dd) return;
  if (!suggestions.length) {
    dd.classList.remove('open');
    return;
  }
  var qRe = q ? q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') : '';
  // Öğeleri data-value attribute ile oluştur — onclick içinde string concat güvenlik riski taşır
  var html = suggestions.map(function(s, i) {
    var label = q ? esc(s).replace(new RegExp('(' + qRe + ')', 'gi'), '<mark>$1</mark>') : esc(s);
    return '<div class="ac-item" id="ac-item-' + field + '-' + i + '" data-acfield="' + esc(field) + '" data-acvalue="' + esc(s) + '">' +
      '<span class="ac-icon">&#x21A9;</span><span style="flex:1">' + label + '</span>' +
      '</div>';
  }).join('');
  if (q) {
    var alreadyInPool = (localDb.pool[field]||[]).some(function(x){ return x.toLowerCase() === q.toLowerCase(); });
    if (!alreadyInPool) {
      html += '<div class="ac-new-hint">Enter ile yeni madde ekle: <span>' + esc(q) + '</span></div>';
    }
  }
  dd.innerHTML = html;
  // Event delegation ile güvenli seçim
  dd.querySelectorAll('.ac-item').forEach(function(el) {
    el.addEventListener('mousedown', function(e) {
      e.preventDefault();
      addModalItem(el.dataset.acfield, el.dataset.acvalue);
    });
  });
  dd.classList.add('open');
}

// acSelect kaldırıldı — renderAcDropdown içinde event delegation kullanılıyor

function acClose(field) {
  var dd = document.getElementById('ac-' + field);
  if (dd) dd.classList.remove('open');
  acFocusIdx[field] = -1;
}

function acBlur(field) {
  setTimeout(function(){ acClose(field); }, 150);
}

function acKeydown(e, field) {
  var dd = document.getElementById('ac-' + field);
  var items = dd ? dd.querySelectorAll('.ac-item') : [];
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acFocusIdx[field] = Math.min(acFocusIdx[field] + 1, items.length - 1);
    acHighlight(field, items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acFocusIdx[field] = Math.max(acFocusIdx[field] - 1, -1);
    acHighlight(field, items);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (acFocusIdx[field] >= 0 && items[acFocusIdx[field]]) {
      items[acFocusIdx[field]].dispatchEvent(new MouseEvent('mousedown'));
    } else {
      addModalItem(field);
    }
  } else if (e.key === 'Escape') {
    acClose(field);
  }
}

function acHighlight(field, items) {
  items.forEach(function(el, i) {
    el.classList.toggle('focused', i === acFocusIdx[field]);
  });
}

function removeModalItem(field, idx) {
  modalItems[field].splice(idx, 1);
  renderModalItems();
}

function renderModalItems() {
  FIELDS.forEach(function(field) {
    if (field === 'tedavi') { renderTedaviGruplari(); return; }
    if (field === 'bulgu') { renderBulguGruplari(); return; }
    var container = document.getElementById('items-' + field);
    if (!container) return;
    container.innerHTML = modalItems[field].map(function(item, i) {
      return '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border)">' +
        '<span style="font-size:12px;color:var(--text3);flex-shrink:0">&#8226;</span>' +
        '<span style="flex:1;font-size:13px;color:var(--text2);cursor:text;" title="Düzenlemek için tıkla" onclick="startEditModalItem(\'' + field + '\',' + i + ',this)">' + esc(item) + '</span>' +
        '<button onclick="removeModalItem(\'' + field + '\',' + i + ')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;padding:0;flex-shrink:0">&#215;</button>' +
        '</div>';
    }).join('');
  });
}

// ── SHARED INLINE EDIT HELPER ──
// Bir DOM elemanını (textEl) input'a çevirir. commit(newVal) ile değeri kaydeder.
function startInlineEdit(textEl, currentValue, borderColor, onCommit) {
  var inp = document.createElement('input');
  inp.value = currentValue;
  inp.style.cssText = 'flex:1;font-size:16px;color:var(--text);border:1.5px solid ' + borderColor + ';border-radius:6px;padding:2px 8px;font-family:Nunito,sans-serif;outline:none;width:100%;';
  textEl.replaceWith(inp);
  inp.focus(); inp.select();
  var committed = false;
  function commit() {
    if (committed) return;
    committed = true;
    var val = inp.value.trim();
    onCommit(val);
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = currentValue; inp.blur(); }
  });
}

function startEditModalItem(field, idx, el) {
  var current = modalItems[field][idx];
  startInlineEdit(el, current, 'var(--dis)', function(val) {
    if (val && val !== current) {
      var dup = modalItems[field].some(function(x,j){ return j!==idx && x.toLowerCase()===val.toLowerCase(); });
      if (dup) { showToast('Bu madde zaten var'); renderModalItems(); return; }
      modalItems[field][idx] = val;
    }
    renderModalItems();
  });
}

function editItem(type, entryId, field, idx) {
  var entry = localDb[type].find(function(e){ return e.id === entryId; });
  if (!entry || !entry[field]) return;
  var current = entry[field][idx];
  var row = document.querySelector('#card-' + entryId + ' .item-row:nth-of-type(' + (idx+1) + ')');
  // Daha güvenilir: tüm item-row'ları alıp index'e göre seç
  var container = document.getElementById('card-' + entryId);
  if (!container) return;
  var fieldSections = container.querySelectorAll('.field-section');
  var fieldIdx = FIELDS.indexOf(field);
  if (fieldIdx < 0 || !fieldSections[fieldIdx]) return;
  var rows = fieldSections[fieldIdx].querySelectorAll('.item-row');
  if (!rows[idx]) return;
  var textEl = rows[idx].querySelector('.i-text');
  if (!textEl) return;
  startInlineEdit(textEl, current, 'var(--dis)', function(val) {
    if (val && val !== current) {
      entry[field][idx] = val;
      scheduleSave();
      if (searchQuery) doSearch(searchQuery);
    }
    rerenderCard(type, entryId);
  });
}



function saveBulgu() {
  return (modalItems.bulgu||[])
    .filter(function(g){ return g && typeof g === 'object'; })
    .map(function(g){ return { baslik: g.baslik||'', maddeler: (g.maddeler||[]).slice() }; });
}
function saveTedavi() {
  return (modalItems.tedavi||[])
    .filter(function(g){ return g && typeof g === 'object'; })
    .map(function(g){ return { baslik: g.baslik||'', maddeler: (g.maddeler||[]).slice() }; });
}

function saveModal() {
  const title = document.getElementById('m-title').value.trim();
  if (!title) { showToast('Başlık gir'); document.getElementById('m-title').focus(); return; }
  const btn = document.getElementById('modalSaveBtn');
  btn.disabled = true;
  try {
    if (editingId) {
      const idx = localDb[modalType].findIndex(function(e){ return e.id === editingId; });
      if (idx > -1) localDb[modalType][idx] = Object.assign({}, localDb[modalType][idx], { title:title, tanim:modalItems.tanim.slice(), sorgu:modalItems.sorgu.slice(), bulgu:saveBulgu(), tetkik:modalItems.tetkik.slice(), tedavi:saveTedavi(), notlar:modalItems.notlar.slice() });
    } else {
      if (localDb[modalType].find(function(e){ return e.title.toLowerCase() === title.toLowerCase(); })) {
        showToast('Bu kayıt zaten var'); return;
      }
      localDb[modalType].unshift({ id: crypto.randomUUID(), title:title, tanim:modalItems.tanim.slice(), sorgu:modalItems.sorgu.slice(), bulgu:saveBulgu(), tetkik:modalItems.tetkik.slice(), tedavi:saveTedavi(), notlar:modalItems.notlar.slice() });
    }
    scheduleSave();
    closeModal();
    renderList(modalType);
    showToast(editingId ? '✓ Güncellendi' : '✓ Eklendi');
  } finally {
    btn.disabled = false;
  }
}


function deleteItem(type, entryId, field, idx) {
  const entry = localDb[type].find(function(e){ return e.id === entryId; });
  if (!entry || !entry[field]) return;
  entry[field].splice(idx, 1);
  scheduleSave(); rerenderCard(type, entryId);
  if (searchQuery) doSearch(searchQuery);
}

function deleteEntry(type, id) {
  showConfirm('Bu girişi çöp kutusuna taşımak istiyor musun?', function() {
    var idx = localDb[type].findIndex(function(e){ return e.id === id; });
    if (idx === -1) return;
    var entry = localDb[type][idx];
    ensureTrash();
    localDb.trash.push({ type: type, entry: entry, deletedAt: Date.now() });
    localDb[type].splice(idx, 1);
    scheduleSave(); renderList(type);
    if (searchQuery) doSearch(searchQuery);
    showToast('🗑 Çöp kutusuna taşındı');

// ── CARD HTML ──
function cardHTML(type, entry, forceOpen) {

  const safeId = esc(entry.id);
  const safeType = esc(type);
  const fieldsHtml = FIELDS.map(function(field) {
    if (field === 'bulgu') {
      var bulgu = migrateBulgu(entry.bulgu);
      if (!bulgu.length) return '';
      var grupHTML = bulgu.map(function(grup) {
        if (!grup.maddeler.length && !grup.baslik) return '';
        var baslikHTML = grup.baslik
          ? '<div style="font-size:14px;font-weight:400;color:#1a7a6e;padding:8px 16px 3px 16px;">' + esc(grup.baslik) + '</div>'
          : '';
        var maddeHTML = grup.maddeler.map(function(item) {

        }).join('');
        return baslikHTML + maddeHTML;
      }).join('');
      if (!grupHTML) return '';
      return '<div class="field-section">' +
        '<div class="field-header"><span class="field-label" style="color:#1a7a6e">BULGU & BELİRTİ</span></div>' +
        '<div>' + grupHTML + '</div></div>';
    }
    if (field === 'tedavi') {
      var tedavi = migrateTedavi(entry.tedavi);
      if (!tedavi.length) return '';
      var grupHTML = tedavi.map(function(grup, gi) {
        if (!grup.maddeler.length && !grup.baslik) return '';
        var baslikHTML = grup.baslik
          ? '<div style="font-size:14px;font-weight:400;color:#1a6fa8;padding:8px 16px 3px 16px;">' + esc(grup.baslik) + '</div>'
          : '';
        var maddeHTML = grup.maddeler.map(function(item, mi) {
          return '<div class="item-row" style="padding-left:' + (grup.baslik ? '32px' : '24px') + ';padding-top:4px;padding-bottom:4px;"><span class="i-dot"></span><span class="i-text">' + esc(item) + '</span></div>';
        }).join('');
        return baslikHTML + maddeHTML;
      }).join('');
      if (!grupHTML) return '';
      return '<div class="field-section">' +
        '<div class="field-header"><span class="field-label" style="color:#1a6fa8">TEDAVİ</span></div>' +
        '<div>' + grupHTML + '</div></div>';
    }
    const items = entry[field] || [];
    if (!items.length) return '';
    const itemsHtml = items.map(function(item, i) {
      return '<div class="item-row"><span class="i-dot"></span><span class="i-text">' + esc(item) + '</span>' +
        '<button class="i-del" title="Düzenle" onclick="editItem(\'' + safeType + '\',\'' + safeId + '\',\'' + field + '\',' + i + ')">✏️</button>' +
        '<button class="i-del" onclick="deleteItem(\'' + safeType + '\',\'' + safeId + '\',\'' + field + '\',' + i + ')">&#215;</button></div>';
    }).join('');

  return '<div class="entry-card ' + safeType + (wasOpen ? ' open' : '') + '" id="card-' + safeId + '">' +

function rerenderCard(type, id) {
  const entry = localDb[type].find(function(e){ return e.id === id; });
  const old = document.getElementById('card-' + id);
  if (!entry || !old) { renderList(type); return; }
  const tmp = document.createElement('div');
  tmp.innerHTML = cardHTML(type, entry, false);
  old.replaceWith(tmp.firstElementChild);
}

function countEntryItems(e) {
  return FIELDS.reduce(function(b, f) {
    if (f === 'tedavi') {
      var ted = migrateTedavi(e.tedavi);
      return b + ted.reduce(function(s, g){ return s + (g.maddeler||[]).length; }, 0);
    }
    if (f === 'bulgu') {
      var bulgu = migrateBulgu(e.bulgu);
      return b + bulgu.reduce(function(s, g){ return s + (g.maddeler||[]).length; }, 0);
    }
    return b + (e[f]||[]).length;
  }, 0);
}

  document.getElementById('stats-' + type).innerHTML = '<strong>' + entries.length + '</strong> giriş · <strong>' + totalItems + '</strong> madde';
  if (!entries.length) {

function renderAll() {

}

// ── SEARCH ──
document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  const sv = document.getElementById('searchView'), mv = document.getElementById('mainView');
  if (searchQuery) { sv.classList.add('active'); mv.classList.add('hidden'); doSearch(searchQuery); }
  else { sv.classList.remove('active'); mv.classList.remove('hidden'); }
});

function doSearch(q) {
  const ql = q.toLowerCase(), results = [];
  ['disease','finding','symptom'].forEach(function(type) {
    localDb[type].forEach(function(entry) {
      const titleMatch = entry.title.toLowerCase().includes(ql);
      const fieldMatches = {};
      let anyMatch = false;
      FIELDS.forEach(function(f) {
        if (f === 'tedavi') {
          var tedItems = [];
          migrateTedavi(entry.tedavi).forEach(function(g){ (g.maddeler||[]).forEach(function(m){ tedItems.push(m); }); });
          var matched = tedItems.filter(function(i){ return i.toLowerCase().includes(ql); });
          if (matched.length) { fieldMatches['tedavi'] = matched; anyMatch = true; }
          else if (titleMatch) { fieldMatches['tedavi'] = tedItems; }
          return;
        }
        if (f === 'bulgu') {
          var bulguItems = [];
          migrateBulgu(entry.bulgu).forEach(function(g){ (g.maddeler||[]).forEach(function(m){ bulguItems.push(m); }); });
          var matched = bulguItems.filter(function(i){ return i.toLowerCase().includes(ql); });
          if (matched.length) { fieldMatches['bulgu'] = matched; anyMatch = true; }
          else if (titleMatch) { fieldMatches['bulgu'] = bulguItems; }
          return;
        }
        var matched = (entry[f]||[]).filter(function(i){ return i.toLowerCase().includes(ql); });
        if (matched.length) { fieldMatches[f] = matched; anyMatch = true; }
        else if (titleMatch) { fieldMatches[f] = entry[f]||[]; }
      });
      if (titleMatch || anyMatch) results.push({ type:type, entry:entry, fieldMatches:fieldMatches, isInfo:false });
    });
  });
  // Bilgi kartlarını da ara
  (localDb.info||[]).forEach(function(entry) {
    const titleMatch = entry.title.toLowerCase().includes(ql);
    var grups = migrateInfoItems(entry.items || []);
    // Tüm maddelerden düz liste çıkar (arama için)
    var allMaddeler = [];
    grups.forEach(function(g){ (g.maddeler||[]).forEach(function(m){ allMaddeler.push(m); }); });
    var matched = allMaddeler.filter(function(i){ return i.toLowerCase().includes(ql); });
    if (titleMatch || matched.length) {
      results.push({ type:'info', entry:entry, fieldMatches:{ items: matched.length ? matched : (titleMatch ? allMaddeler : []) }, isInfo:true });
    }
  });

  document.getElementById('searchStats').innerHTML = '"<strong>' + esc(q) + '</strong>" için <strong>' + results.length + '</strong> sonuç';
  const container = document.getElementById('searchResults');
  if (!results.length) { container.innerHTML = '<div class="empty-state"><div class="ei">🔍</div><h3>Sonuç bulunamadı</h3><p>"' + esc(q) + '" ile eşleşen kayıt yok.</p></div>'; return; }

  container.innerHTML = results.map(function(r) {
    const safeType = esc(r.type);
    const safeId = esc(r.entry.id);
    var fh;
    if (r.isInfo) {
      const items = r.fieldMatches.items || [];
      fh = items.length ? '<div class="sr-field"><div class="sr-field-label" style="color:#b7860b">Notlar</div>' +
        items.map(function(i){ return '<div class="sr-item">• ' + hl(i,q) + '</div>'; }).join('') + '</div>' : '';
    } else {
      fh = FIELDS.map(function(field) {
        const items = r.fieldMatches[field]||[];
        if (!items.length) return '';
        return '<div class="sr-field"><div class="sr-field-label ' + field + '" style="color:' + FIELD_COLORS[field] + '">' + FIELD_LABELS[field] + '</div>' +
          items.map(function(i){ return '<div class="sr-item">• ' + hl(i,q) + '</div>'; }).join('') + '</div>';
      }).join('');
    }
    return '<div class="search-result" onclick="goToCard(\'' + safeType + '\',\'' + safeId + '\')">' +
      '<div class="sr-header"><span class="sr-badge ' + safeType + '">' + LABELS[r.type] + '</span><span class="sr-title">' + hl(r.entry.title,q) + '</span><span class="sr-goto">Git →</span></div>' +
      (fh || '<div class="sr-field" style="color:var(--text3);font-size:13px;font-style:italic">Başlıkta eşleşme</div>') + '</div>';
  }).join('');
}

function goToCard(type, id) {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchView').classList.remove('active');
  document.getElementById('mainView').classList.remove('hidden');
  switchTab(type);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      var cardId = type === 'info' ? 'icard-' + id : 'card-' + id;
      var card = document.getElementById(cardId);
      if (!card) return;
      card.classList.add('open');
      card.scrollIntoView({ behavior:'smooth', block:'center' });
      var color = type==='disease'?'var(--dis)':type==='finding'?'var(--fin)':type==='symptom'?'var(--sym)':'#b7860b';
      card.style.boxShadow = '0 0 0 3px ' + color;
      setTimeout(function(){ card.style.boxShadow = ''; }, 1800);
    });
  });
}

var exportScope = 'all';
var exportFormat = 'pdf';

function setExportScope(scope) {
  exportScope = scope;
  document.querySelectorAll('[id^="escope-"]').forEach(function(b){ b.classList.remove('active'); });
  var el = document.getElementById('escope-' + scope);
  if (el) el.classList.add('active');
}

function setExportFormat(fmt) {
  exportFormat = fmt;
  document.querySelectorAll('[id^="efmt-"]').forEach(function(b){ b.classList.remove('active'); });
  var el = document.getElementById('efmt-' + fmt);
  if (el) el.classList.add('active');
}

function buildExportData() {
  var types = exportScope === 'all'
    ? ['disease','finding','symptom','info']
    : [exportScope];
  var sections = [];
  var typeLabels = { disease:'Hastalık', finding:'Bulgu', symptom:'Belirti', info:'Bilgi Kartı' };
  types.forEach(function(type) {
    var entries = localDb[type] || [];
    if (!entries.length) return;
    sections.push({ type: type, label: typeLabels[type], entries: entries });
  });
  return sections;
}

function buildPrintHTML(sections) {

            html += '<ul style="margin:2px 0 4px ' + (grup.baslik ? '28px' : '20px') + ';padding:0;">';
            grup.maddeler.forEach(function(item){ html += '<li style="font-size:13px;color:#5c524a;margin-bottom:3px;">' + item + '</li>'; });

      } else {

              html += '<ul style="margin:2px 0 4px ' + (grup.baslik ? '28px' : '18px') + ';padding:0;">';

            if (!hasItems) return;
            html += '<div style="margin-bottom:6px;"><span style="font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px;color:#1a6fa8;">Tedavi</span>';

function triggerDownload(blob, filename) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

function doExport() {
  var sections = buildExportData();
  if (!sections.length) { showToast('Seçili kategoride veri yok'); return; }
  if (exportFormat === 'pdf') { exportPDF(sections); }
  else if (exportFormat === 'doc') { exportWord(sections); }
  else if (exportFormat === 'txt') { exportTXT(sections); }
  else if (exportFormat === 'both') {
    var date = new Date().toISOString().slice(0,10);

    // PDF
    var pdfContent = buildPrintHTML(sections);
    var pdfHtml = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>MedLog</title><style>' +
      'body{font-family:Georgia,serif;margin:40px;background:#fff;color:#1a1714;}' +
      '@media print{body{margin:20px;}@page{margin:2cm;}}' +
      '</style></head><body>' + pdfContent +
      '<script>window.onload=function(){window.print();}<\/script></body></html>';
    triggerDownload(new Blob([pdfHtml], {type:'text/html;charset=utf-8'}), 'medlog_' + date + '.html');

    // Word
    setTimeout(function() {
      exportWord(sections);
    }, 500);

    // TXT
    setTimeout(function() {
      var txtLines = buildTXTLines(sections);
      triggerDownload(new Blob([txtLines.join('\n')], {type:'text/plain;charset=utf-8'}), 'medlog_' + date + '.txt');
    }, 1000);

    showToast('3 dosya indiriliyor…');
  }
}

function exportTXT(sections) {
  var fieldLabels = { tanim:'Tanım', sorgu:'Sorgu', bulgu:'Bulgu & Belirti', tetkik:'Tetkik', tedavi:'Tedavi', notlar:'Notlar' };
  var lines = ['MedLog — ' + new Date().toLocaleDateString('tr-TR'), ''];
  sections.forEach(function(sec) {
    lines.push('═══ ' + sec.label.toUpperCase() + ' ═══', '');
    sec.entries.forEach(function(entry) {
      lines.push('• ' + entry.title);
      if (sec.type === 'info') {
        var grups = migrateInfoItems(entry.items||[]);
        grups.forEach(function(grup) {
          if (!grup.maddeler.length) return;
          if (grup.baslik) lines.push('  ▸ ' + grup.baslik);
          grup.maddeler.forEach(function(item){ lines.push((grup.baslik ? '    ' : '  ') + '- ' + item); });
        });
      } else {
        var fields = sec.type === 'disease' ? ['tanim','sorgu','bulgu','tetkik','tedavi','notlar'] : ['tanim','sorgu','bulgu','tetkik','tedavi','notlar'];
        fields.forEach(function(f) {
          if (f === 'bulgu') {
            var bulgu = migrateBulgu(entry.bulgu);
            if (!bulgu.length) return;
            var hasItems = bulgu.some(function(g){ return g.maddeler && g.maddeler.length; });
            if (!hasItems) return;
            lines.push('  [BULGU & BELİRTİ]');
            bulgu.forEach(function(grup) {
              if (!grup.maddeler.length) return;
              if (grup.baslik) lines.push('    ▸ ' + grup.baslik);
              grup.maddeler.forEach(function(m){ lines.push((grup.baslik ? '      ' : '    ') + '- ' + m); });
            });
            return;
          }
          if (f === 'tedavi') {
            var tedavi = migrateTedavi(entry.tedavi);
            if (!tedavi.length) return;
            lines.push('  [TEDAVİ]');
            tedavi.forEach(function(grup) {
              if (!grup.maddeler.length) return;
              if (grup.baslik) lines.push('    ▸ ' + grup.baslik);
              grup.maddeler.forEach(function(m){ lines.push('      - ' + m); });
            });
            return;
          }
          var items = entry[f]||[];
          if (!items.length) return;
          lines.push('  [' + (fieldLabels[f]||f).toUpperCase() + ']');
          items.forEach(function(item){ lines.push('    - ' + item); });
        });
      }
      lines.push('');
    });
  });
  var blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'medlog_' + new Date().toISOString().slice(0,10) + '.txt';
  a.click(); setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  showToast('🔤 TXT indirildi');
}

function exportCSV(sections) {
  var fieldLabels = { tanim:'Tanım', sorgu:'Sorgu', bulgu:'Bulgu & Belirti', tetkik:'Tetkik', tedavi:'Tedavi', notlar:'Notlar' };
  var rows = [['Kategori','Başlık','Alan','Madde']];
  sections.forEach(function(sec) {
    sec.entries.forEach(function(entry) {
      if (sec.type === 'info') {
        var grups = migrateInfoItems(entry.items||[]);
        var hasAnyItems = grups.some(function(g){ return g.maddeler && g.maddeler.length; });
        if (!hasAnyItems) { rows.push([sec.label, entry.title, '', '']); return; }
        grups.forEach(function(grup) {
          var alan = 'Notlar' + (grup.baslik ? ' — ' + grup.baslik : '');
          (grup.maddeler||[]).forEach(function(item){ rows.push([sec.label, entry.title, alan, item]); });
        });
      } else {
        var fields = sec.type === 'disease' ? ['tanim','sorgu','bulgu','tetkik','tedavi','notlar'] : ['tanim','sorgu','bulgu','tetkik','tedavi','notlar'];
        var hasAny = false;
        fields.forEach(function(f) {
          if (f === 'tedavi') {
            var tedavi = migrateTedavi(entry.tedavi);
            tedavi.forEach(function(grup) {
              var alan = 'Tedavi' + (grup.baslik ? ' — ' + grup.baslik : '');
              grup.maddeler.forEach(function(item){
                rows.push([sec.label, entry.title, alan, item]);
                hasAny = true;
              });
            });
            return;
          }
          (entry[f]||[]).forEach(function(item){
            rows.push([sec.label, entry.title, fieldLabels[f]||f, item]);
            hasAny = true;
          });
        });
        if (!hasAny) rows.push([sec.label, entry.title, '', '']);
      }
    });
  });
  var csv = rows.map(function(r){ return r.map(function(c){ return '"' + String(c).replace(/"/g,'""') + '"'; }).join(','); }).join('\n');
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'medlog_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  showToast('📊 CSV indirildi');
}

function openTrash() {
