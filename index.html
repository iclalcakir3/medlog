<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLog</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta name="theme-color" content="#c0392b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MedLog">
<link rel="apple-touch-icon" sizes="512x512" href="icon.png?v=2">
<link rel="icon" type="image/png" sizes="512x512" href="icon.png?v=2">
<link rel="shortcut icon" href="icon.png?v=2">
<style>
:root {
  --bg:#f5f2ee; --surface:#fff; --surface2:#faf8f5;
  --border:#e4ddd4; --border2:#cec4b8;
  --text:#1a1714; --text2:#5c524a; --text3:#9c8f84;
  --dis:#c0392b; --dis-bg:#fdf0ee; --dis-border:#f5c6c0;
  --fin:#1a6fa8; --fin-bg:#eaf3fb; --fin-border:#a8d0ed;
  --sym:#1a7a6e; --sym-bg:#e8f5f3; --sym-border:#a8d8d2;
  --radius:14px; --radius-sm:9px;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

header{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 12px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:8px;height:56px;}
.logo{font-family:'Lora',serif;font-size:19px;font-weight:600;color:var(--dis);flex-shrink:0;min-width:72px;}
.logo span{color:var(--text);}
.search-wrap{position:relative;flex:1;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
#searchInput{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:24px;padding:8px 14px 8px 36px;font-family:'Nunito',sans-serif;font-size:16px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;}
#searchInput:focus{border-color:var(--dis);box-shadow:0 0 0 3px var(--dis-bg);}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;min-width:72px;justify-content:flex-end;}
.hdr-btn{background:none;border:none;padding:0;margin:0;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;width:24px;height:24px;transition:opacity .15s;flex-shrink:0;}
.hdr-btn svg{width:20px;height:20px;}
.hdr-btn:hover{opacity:.55;}
.settings-btn{background:none;border:none;padding:0;margin:0;cursor:pointer;color:var(--text2);font-size:20px;display:flex;align-items:center;transition:opacity .15s;line-height:1;width:20px;height:20px;}
.settings-btn:hover{opacity:.6;}
.saving-dot{width:7px;height:7px;border-radius:50%;background:transparent;flex-shrink:0;transition:background .3s;}
.saving-dot.saving{background:#f39c12;animation:pulse .6s infinite;}
.saving-dot.saved{background:#27ae60;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.settings-panel{position:fixed;inset:0;z-index:300;display:none;}
.settings-panel.open{display:block;}
.s-backdrop{position:absolute;inset:0;background:rgba(26,23,20,.4);backdrop-filter:blur(2px);}
.s-drawer{position:absolute;top:0;right:0;bottom:0;width:min(340px,92vw);background:var(--surface);border-left:1.5px solid var(--border);display:flex;flex-direction:column;animation:drawerIn .22s ease;box-shadow:-4px 0 32px rgba(0,0,0,.1);}
@keyframes drawerIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.s-head{padding:18px 20px 14px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.s-head-title{font-family:'Lora',serif;font-size:17px;font-weight:600;}
.s-close{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;cursor:pointer;color:var(--text3);font-size:14px;transition:all .15s;}
.s-close:hover{background:var(--bg);}
.s-body{flex:1;overflow-y:auto;padding:18px 20px;}
.s-section{margin-bottom:22px;}

.s-section-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);font-family:'DM Mono',monospace;margin-bottom:10px;}
.auth-block{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;}
.auth-user-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.auth-avatar{width:38px;height:38px;border-radius:50%;border:2px solid var(--border);object-fit:cover;flex-shrink:0;}
.auth-name{font-size:13px;font-weight:700;color:var(--text);}
.auth-email{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px;}
.auth-note{font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:10px;}
.sync-badge{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;margin-bottom:7px;width:100%;}
.sync-badge.synced{background:#eafaf1;color:#1e8449;border:1px solid #a9dfbf;}
.sync-badge.local{background:#fff8e1;color:#856404;border:1px solid #ffc107;}
.sync-badge .dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;}
.synced .dot{background:#27ae60;}
.local .dot{background:#f39c12;}
.s-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;margin-bottom:7px;}
.s-btn:last-child{margin-bottom:0;}
.s-btn:hover{background:var(--bg);border-color:var(--border2);}
.s-btn.google{background:#fff;border-color:#ddd;color:#333;}
.s-btn.google:hover{background:#f8f8f8;}
.s-btn.danger{color:var(--dis);}
.s-btn.danger:hover{background:var(--dis-bg);border-color:var(--dis-border);}
.s-divider{height:1px;background:var(--border);margin:10px 0;}

.tab-nav{display:flex;background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 14px;position:sticky;top:56px;z-index:90;}
.tab-btn{padding:12px 16px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:color .15s;display:flex;align-items:center;justify-content:center;gap:6px;flex:1;}
.tab-btn .tab-dot{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0;vertical-align:middle;margin-bottom:1px;}
.tab-btn[data-tab="disease"]:hover,.tab-btn[data-tab="disease"].active{color:var(--dis);}
.tab-btn[data-tab="finding"]:hover,.tab-btn[data-tab="finding"].active{color:var(--fin);}
.tab-btn[data-tab="symptom"]:hover,.tab-btn[data-tab="symptom"].active{color:var(--sym);}
.tab-btn[data-tab="info"]:hover,.tab-btn[data-tab="info"].active{color:#b7860b;}
.tab-btn[data-tab="disease"].active{border-bottom-color:var(--dis);}
.tab-btn[data-tab="finding"].active{border-bottom-color:var(--fin);}
.tab-btn[data-tab="symptom"].active{border-bottom-color:var(--sym);}
.tab-btn[data-tab="info"].active{border-bottom-color:#b7860b;}

.add-entry-btn.info:hover{border-color:#b7860b;color:#b7860b;background:#fdf8ec;}

/* Info card */
.info-card .entry-header{border-left:3.5px solid #b7860b;}
.info-item-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.info-item-row:last-child{border-bottom:none;}
.info-item-dot{width:5px;height:5px;border-radius:50%;background:#b7860b;flex-shrink:0;margin-top:7px;}
.info-item-text{flex:1;font-size:13px;color:var(--text2);line-height:1.5;}
.info-item-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;padding:0;flex-shrink:0;margin-top:2px;transition:color .15s;}
.info-item-del:hover{color:var(--dis);}
.info-body-item{display:flex;align-items:flex-start;gap:8px;padding:7px 16px;transition:background .15s;}
.info-body-item:hover{background:var(--surface2);}
.info-body-dot{width:5px;height:5px;border-radius:50%;background:#b7860b;opacity:.7;flex-shrink:0;margin-top:7px;}
.info-body-text{flex:1;font-size:14px;color:var(--text2);line-height:1.5;}
.info-body-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;opacity:0;transition:opacity .15s,color .15s;padding:0 2px;line-height:1;flex-shrink:0;margin-top:2px;}
.info-body-item:hover .info-body-del{opacity:1;}
.info-body-del:hover{color:var(--dis);}

/* Pool drawer */
.pool-drawer-overlay{position:fixed;inset:0;background:rgba(26,23,20,.45);z-index:400;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
.pool-drawer-overlay.open{display:flex;}
@media(min-width:600px){.pool-drawer-overlay{align-items:center;}}
.pool-drawer{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:560px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 -4px 32px rgba(0,0,0,.12);animation:slideUp .22s ease;}
@media(min-width:600px){.pool-drawer{border-radius:var(--radius);max-height:78vh;}}
.pool-drawer-head{padding:16px 20px 12px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.pool-drawer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pool-drawer-title{font-family:'Lora',serif;font-size:16px;font-weight:600;flex:1;}
.pool-drawer-count{font-size:11px;font-weight:800;font-family:'DM Mono',monospace;color:var(--text3);margin-right:6px;}
.pool-drawer-close{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;cursor:pointer;color:var(--text3);font-size:14px;transition:all .15s;}
.pool-drawer-close:hover{background:var(--bg);}
.pool-drawer-body{flex:1;overflow-y:auto;padding:14px 20px;}
.pool-drawer-search{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-family:'Nunito',sans-serif;font-size:16px;color:var(--text);background:var(--surface2);outline:none;margin-bottom:12px;transition:border-color .2s;}
.pool-drawer-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;min-height:20px;}
.pool-drawer-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px 5px 12px;border-radius:14px;font-size:13px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);}
.pool-drawer-chip span{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pool-drawer-chip button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;padding:0 0 0 2px;flex-shrink:0;transition:color .15s;}
.pool-drawer-chip button:hover{color:var(--dis);}
.pool-drawer-empty{font-size:13px;color:var(--text3);font-style:italic;padding:4px 0 14px;}
.pool-drawer-add{display:flex;gap:8px;border-top:1px solid var(--border);padding-top:12px;}
.pool-drawer-input{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-family:'Nunito',sans-serif;font-size:16px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .2s;}
.pool-drawer-btn{border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;color:white;white-space:nowrap;transition:opacity .15s;}
.pool-drawer-btn:hover{opacity:.85;}

.app{max-width:820px;margin:0 auto;padding:20px 14px 80px;}
.tab-panel{display:none;}.tab-panel.active{display:block;}
#searchView{display:none;}#searchView.active{display:block;}
#mainView.hidden{display:none;}


.add-entry-btn{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px dashed var(--border2);border-radius:var(--radius);padding:13px 16px;margin-bottom:14px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text3);transition:all .15s;width:100%;}
.add-entry-btn.disease:hover{border-color:var(--dis);color:var(--dis);background:var(--dis-bg);}
.add-entry-btn.finding:hover{border-color:var(--fin);color:var(--fin);background:var(--fin-bg);}
.add-entry-btn.symptom:hover{border-color:var(--sym);color:var(--sym);background:var(--sym-bg);}

.sec-stats{font-size:12px;color:var(--text3);font-weight:700;margin-bottom:12px;}
.sec-stats strong{color:var(--text2);}

.entry-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .3s,border-color .3s;}
.entry-header{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .15s;}
.entry-header:hover{background:var(--surface2);}
.e-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.disease .e-dot{background:var(--dis);}
.finding .e-dot{background:var(--fin);}
.symptom .e-dot{background:var(--sym);}
.e-title{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--text);flex:1;}
.e-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;opacity:0;transition:opacity .15s,color .15s;padding:2px 4px;}
.entry-header:hover .e-del{opacity:1;}
.e-del:hover{color:var(--dis);}
.chevron{color:var(--text3);transition:transform .2s;font-size:11px;flex-shrink:0;}
.entry-card.open .chevron{transform:rotate(180deg);}
.entry-body{display:none;border-top:1.5px solid var(--border);}
.entry-card.open .entry-body{display:block;}

.field-section{border-bottom:1px solid var(--border);}
.field-section:last-child{border-bottom:none;}
.field-header{padding:10px 16px 6px;}
.field-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;font-family:'DM Mono',monospace;}
.item-row{display:flex;align-items:flex-start;gap:8px;padding:6px 16px 6px 32px;transition:background .15s;}
.item-row:hover{background:var(--surface2);}
.i-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:7px;opacity:.4;background:var(--text2);}
.i-text{flex:1;font-size:14px;color:var(--text2);line-height:1.5;}
.i-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;opacity:0;transition:opacity .15s,color .15s;padding:0 2px;line-height:1;flex-shrink:0;margin-top:2px;}
.item-row:hover .i-del{opacity:1;}
.i-del:hover{color:var(--dis);}

.overlay{display:none;position:fixed;inset:0;background:rgba(26,23,20,.45);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
.overlay.open{display:flex;}
@media(min-width:600px){.overlay{align-items:center;}}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 -4px 32px rgba(0,0,0,.12);animation:slideUp .22s ease;}
@media(min-width:600px){.modal{border-radius:var(--radius);max-height:85vh;}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-header{padding:18px 20px 14px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.modal-header-title{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--text);flex:1;}
.modal-close{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;cursor:pointer;color:var(--text3);font-size:14px;transition:all .15s;}
.modal-close:hover{background:var(--bg);}
.modal-body{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:16px;}
.mfield label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;margin-bottom:6px;}
.mfield-tanim label{color:var(--text3);}
.mfield-sorgu label{color:#8e44ad;}
.mfield-tetkik label{color:#d35400;}
.mfield-notlar label{color:#1a7a6e;}
.mfield input, .mfield-input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-family:'Nunito',sans-serif;font-size:16px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .2s,box-shadow .2s;}
.mfield input:focus{border-color:var(--dis);box-shadow:0 0 0 3px var(--dis-bg);}
.mfield input::placeholder{color:var(--text3);}
.modal-footer{padding:14px 20px;border-top:1.5px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.btn-cancel{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 18px;cursor:pointer;color:var(--text2);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;transition:all .15s;}
.btn-cancel:hover{background:var(--bg);}
.btn-save{border:none;border-radius:var(--radius-sm);padding:9px 24px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;color:white;margin-left:auto;transition:opacity .15s;}
.btn-save:hover{opacity:.85;}
.btn-save.disease{background:var(--dis);}
.btn-save.finding{background:var(--fin);}
.btn-save.symptom{background:var(--sym);}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}

.search-result{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:border-color .15s;}
.search-result:hover{border-color:var(--border2);}
.sr-header{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--border);}
.sr-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.4px;}
.sr-badge.disease{background:var(--dis-bg);color:var(--dis);}
.sr-badge.finding{background:var(--fin-bg);color:var(--fin);}
.sr-badge.symptom{background:var(--sym-bg);color:var(--sym);}
.sr-title{font-family:'Lora',serif;font-size:15px;font-weight:600;flex:1;}
.sr-goto{font-size:11px;color:var(--text3);font-weight:700;opacity:0;transition:opacity .15s;white-space:nowrap;}
.search-result:hover .sr-goto{opacity:1;}
.sr-field{padding:8px 16px;border-bottom:1px solid var(--border);}
.sr-field:last-child{border-bottom:none;}
.sr-field-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;margin-bottom:4px;}
.sr-field-label.tanim{color:var(--text3);}
.sr-field-label.sorgu{color:#8e44ad;}
.sr-field-label.tetkik{color:#d35400;}
.sr-field-label.notlar{color:#1a7a6e;}
.sr-item{font-size:14px;color:var(--text2);padding:2px 0 2px 10px;}
mark{background:#ffeaa7;border-radius:3px;padding:0 2px;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-state .ei{font-size:44px;margin-bottom:12px;}
.empty-state h3{font-family:'Lora',serif;font-size:17px;color:var(--text2);margin-bottom:6px;}
.empty-state p{font-size:14px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1714;color:white;padding:9px 20px;border-radius:24px;font-size:13px;font-weight:700;z-index:999;transition:transform .3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Confirm dialog */
.confirm-overlay{position:fixed;inset:0;background:rgba(26,23,20,.45);z-index:600;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.confirm-overlay.open{display:flex;}
.confirm-box{background:var(--surface);border-radius:var(--radius);padding:24px 20px 16px;width:min(320px,88vw);box-shadow:0 8px 40px rgba(0,0,0,.18);animation:slideUp .18s ease;}
.confirm-msg{font-size:15px;color:var(--text);line-height:1.5;margin-bottom:18px;text-align:center;}
.confirm-btns{display:flex;gap:8px;justify-content:flex-end;}
.confirm-cancel{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text2);transition:all .15s;}
.confirm-cancel:hover{background:var(--bg);}
.confirm-ok{border:none;border-radius:var(--radius-sm);padding:8px 18px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:white;background:var(--dis);transition:opacity .15s;}
.confirm-ok:hover{opacity:.85;}

/* ── AUTOCOMPLETE ── */
.ac-wrap{position:relative;}
.ac-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius-sm);box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:500;max-height:200px;overflow-y:auto;display:none;}
.ac-dropdown.open{display:block;}
.ac-item{padding:8px 12px;font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s;}
.ac-item:hover,.ac-item.focused{background:var(--bg);}
.ac-item .ac-icon{font-size:10px;opacity:.4;flex-shrink:0;}
.ac-item mark{background:#ffeaa7;border-radius:2px;padding:0 2px;}
.ac-empty{padding:8px 12px;font-size:12px;color:var(--text3);font-style:italic;}
.ac-new-hint{padding:6px 12px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);background:var(--surface2);}
.ac-new-hint span{font-weight:700;color:var(--text2);}
.pool-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px;background:var(--bg);color:var(--text3);font-family:'DM Mono',monospace;border:1px solid var(--border);margin-left:auto;flex-shrink:0;}
.pool-stats{font-size:11px;color:var(--text3);margin-top:4px;}

@media(max-width:480px){
  .tab-btn{padding:12px 10px;font-size:13px;}
  .tab-btn .lbl{display:none;}
}

/* ── HIZLI NOT BUTONU ── */
.fab{position:fixed;bottom:28px;right:20px;z-index:250;width:52px;height:52px;border-radius:50%;background:var(--dis);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(192,57,43,.35);transition:transform .15s,box-shadow .15s;}
.fab:hover{transform:scale(1.07);box-shadow:0 6px 24px rgba(192,57,43,.45);}
.fab:active{transform:scale(.95);}
.fab svg{width:22px;height:22px;stroke:white;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}

/* FAB menü */
.fab-menu{position:fixed;bottom:90px;right:20px;z-index:250;display:flex;flex-direction:column;gap:10px;align-items:flex-end;pointer-events:none;opacity:0;transform:translateY(10px);transition:opacity .2s,transform .2s;}
.fab-menu.open{pointer-events:auto;opacity:1;transform:translateY(0);}
.fab-item{display:flex;align-items:center;gap:10px;cursor:pointer;background:none;border:none;padding:0;}
.fab-item-label{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:6px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text2);white-space:nowrap;box-shadow:var(--shadow);}
.fab-item-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow);transition:transform .15s;}
.fab-item-btn:hover{transform:scale(1.08);}
.fab-item-btn svg{width:18px;height:18px;stroke:white;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}

/* ── İSTATİSTİK MODALİ ── */
.stats-overlay{position:fixed;inset:0;background:rgba(26,23,20,.45);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
.stats-overlay.open{display:flex;}
@media(min-width:600px){.stats-overlay{align-items:center;}}
.stats-modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:480px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 -4px 32px rgba(0,0,0,.12);animation:slideUp .22s ease;}
@media(min-width:600px){.stats-modal{border-radius:var(--radius);max-height:80vh;}}
.stats-head{padding:18px 20px 14px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.stats-head-title{font-family:'Lora',serif;font-size:16px;font-weight:600;flex:1;}
.stats-close{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;cursor:pointer;color:var(--text3);font-size:14px;transition:all .15s;}
.stats-close:hover{background:var(--bg);}
.stats-body{flex:1;overflow-y:auto;padding:20px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;}
.stat-card-val{font-size:28px;font-weight:800;font-family:'Nunito',sans-serif;line-height:1;}
.stat-card-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;color:var(--text3);margin-top:4px;}
.stat-card.dis .stat-card-val{color:var(--dis);}
.stat-card.fin .stat-card-val{color:var(--fin);}
.stat-card.sym .stat-card-val{color:var(--sym);}
.stat-card.inf .stat-card-val{color:#b7860b;}
.stat-card.total .stat-card-val{color:var(--text);}
.stats-section-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);font-family:'DM Mono',monospace;margin-bottom:10px;margin-top:4px;}
.stats-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.stats-bar-label{font-size:12px;color:var(--text2);width:70px;flex-shrink:0;font-weight:700;}
.stats-bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.stats-bar-fill{height:100%;border-radius:4px;transition:width .4s ease;}
.stats-bar-num{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;width:30px;text-align:right;flex-shrink:0;}
.stats-top-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);font-family:'DM Mono',monospace;margin-bottom:8px;margin-top:16px;}
.stats-top-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.stats-top-item:last-child{border-bottom:none;}
.stats-top-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.stats-top-name{font-size:13px;color:var(--text2);flex:1;font-family:'Lora',serif;font-weight:600;}
.stats-top-count{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
/* ── SINAV ── */
.exam-screen{position:fixed;inset:0;z-index:400;background:var(--bg);display:none;flex-direction:column;}
.exam-screen.open{display:flex;}
.exam-header{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.exam-header-title{font-family:'Lora',serif;font-size:17px;font-weight:600;flex:1;}
.exam-close-btn{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 12px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text3);transition:all .15s;}
.exam-close-btn:hover{background:var(--bg);}
.exam-progress-bar{height:4px;background:var(--border);flex-shrink:0;}
.exam-progress-fill{height:100%;background:var(--dis);transition:width .4s ease;border-radius:0 2px 2px 0;}
.exam-body{flex:1;overflow-y:auto;padding:24px 20px;max-width:600px;width:100%;margin:0 auto;}

/* Başlangıç ekranı */
.exam-start{display:flex;flex-direction:column;gap:18px;}
.exam-start-title{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--text);margin-bottom:4px;}
.exam-start-desc{font-size:14px;color:var(--text3);line-height:1.6;}
.exam-option-group{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.exam-option-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;font-family:'DM Mono',monospace;color:var(--text3);padding:12px 16px 6px;}
.exam-option-row{display:flex;align-items:center;padding:10px 16px;gap:10px;border-top:1px solid var(--border);cursor:pointer;transition:background .15s;}
.exam-option-row:first-of-type{border-top:none;}
.exam-option-row:hover{background:var(--bg);}
.exam-option-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--dis);cursor:pointer;flex-shrink:0;}
.exam-option-row label{font-size:14px;color:var(--text2);font-weight:600;cursor:pointer;flex:1;}
.exam-count-row{display:flex;align-items:center;gap:12px;padding:10px 16px;}
.exam-count-row label{font-size:14px;color:var(--text2);font-weight:600;flex:1;}
.exam-count-row input[type=range]{flex:1;accent-color:var(--dis);}
.exam-count-val{font-size:14px;font-weight:800;color:var(--dis);font-family:'Nunito',sans-serif;min-width:28px;text-align:right;}
.exam-start-btn{border:none;border-radius:var(--radius);padding:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;color:white;background:var(--dis);cursor:pointer;transition:opacity .15s;width:100%;}
.exam-start-btn:hover{opacity:.88;}
.exam-start-btn:disabled{opacity:.4;cursor:not-allowed;}

/* Soru ekranı */
.exam-q-meta{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.exam-q-num{font-size:12px;font-weight:800;font-family:'DM Mono',monospace;color:var(--text3);}
.exam-q-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.4px;}
.exam-q-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:18px;box-shadow:var(--shadow);}
.exam-q-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:8px;}
.exam-q-text{font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--text);line-height:1.4;}
.exam-q-sub{font-size:13px;color:var(--text3);margin-top:6px;}

/* Çoktan seçmeli */
.exam-choices{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.exam-choice{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;text-align:left;font-family:'Nunito',sans-serif;width:100%;}
.exam-choice:hover:not(:disabled){border-color:var(--dis);color:var(--dis);background:var(--dis-bg);}
.exam-choice.correct{border-color:#27ae60;background:#eafaf1;color:#1a7a4a;}
.exam-choice.wrong{border-color:var(--dis);background:var(--dis-bg);color:var(--dis);}
.exam-choice:disabled{cursor:default;}

/* Açık uçlu */
.exam-open-wrap{margin-bottom:20px;}
.exam-open-input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-family:'Nunito',sans-serif;font-size:16px;color:var(--text);background:var(--surface);outline:none;transition:border-color .2s;resize:none;}
.exam-open-input:focus{border-color:var(--dis);box-shadow:0 0 0 3px var(--dis-bg);}
.exam-open-btn{border:none;border-radius:var(--radius-sm);padding:10px 20px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:white;background:var(--dis);cursor:pointer;transition:opacity .15s;}
.exam-open-btn:hover{opacity:.88;}
.exam-feedback{border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:16px;font-size:13px;line-height:1.6;}
.exam-feedback.correct{background:#eafaf1;border:1.5px solid #a9dfbf;color:#1a7a4a;}
.exam-feedback.partial{background:#fef9e7;border:1.5px solid #f9e79f;color:#7d6608;}
.exam-feedback.wrong{background:var(--dis-bg);border:1.5px solid var(--dis-border);color:var(--dis);}
.exam-feedback-title{font-weight:800;margin-bottom:6px;font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
.exam-feedback-items{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.exam-feedback-chip{font-size:12px;padding:3px 10px;border-radius:10px;font-weight:700;}
.exam-feedback-chip.hit{background:#a9dfbf;color:#1a7a4a;}
.exam-feedback-chip.miss{background:var(--dis-border);color:var(--dis);}
.exam-next-btn{border:none;border-radius:var(--radius-sm);padding:11px 24px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:white;background:var(--fin);cursor:pointer;transition:opacity .15s;width:100%;}
.exam-next-btn:hover{opacity:.88;}

/* Sonuç ekranı */
.exam-result{display:flex;flex-direction:column;align-items:center;gap:16px;padding:16px 0;}
.exam-result-score{font-size:64px;font-weight:800;font-family:'Nunito',sans-serif;color:var(--dis);line-height:1;}
.exam-result-label{font-size:14px;color:var(--text3);font-weight:700;}
.exam-result-detail{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 20px;width:100%;}
.exam-result-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.exam-result-row:last-child{border-bottom:none;}
.exam-result-restart{border:none;border-radius:var(--radius-sm);padding:12px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:white;background:var(--dis);cursor:pointer;width:100%;transition:opacity .15s;}
.exam-result-restart:hover{opacity:.88;}
.exam-result-back{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text2);cursor:pointer;width:100%;transition:all .15s;}
.exam-result-back:hover{background:var(--bg);}

#ptr-indicator{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:10px;
  height:0;overflow:hidden;
  background:var(--surface);
  border-bottom:1.5px solid var(--border);
  z-index:150;
  opacity:0;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text3);
}
#ptr-indicator.pulling{opacity:1;}
#ptr-indicator.ready{color:var(--dis);}
#ptr-indicator.refreshing{
  height:52px;opacity:1;
  transition:height .25s ease, opacity .2s ease;
}
.ptr-spinner{
  width:18px;height:18px;
  border:2.5px solid var(--border2);
  border-top-color:var(--dis);
  border-radius:50%;
  flex-shrink:0;
}
#ptr-indicator.refreshing .ptr-spinner{
  animation:ptr-spin .7s linear infinite;
}
@keyframes ptr-spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="ptr-indicator">
  <div class="ptr-spinner" id="ptr-spinner"></div>
  <span id="ptr-label">Yenilemek için çek…</span>
</div>

<div id="appScreen">
  <header>
    <div class="logo">Med<span>Log</span></div>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" type="search" placeholder="Ara…" autocomplete="off">
    </div>
    <div class="header-right">
      <button class="hdr-btn" onclick="openExam()" title="Sınav">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </button>
      <button class="hdr-btn" onclick="openStatsModal()" title="İstatistikler">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      </button>
      <button class="hdr-btn" onclick="openSettings()" title="Ayarlar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="disease" onclick="switchTab('disease')"><span class="tab-dot" style="background:var(--dis)"></span> <span class="lbl">Hastalık</span></button>
    <button class="tab-btn" data-tab="finding" onclick="switchTab('finding')"><span class="tab-dot" style="background:var(--fin)"></span> <span class="lbl">Bulgu</span></button>
    <button class="tab-btn" data-tab="symptom" onclick="switchTab('symptom')"><span class="tab-dot" style="background:var(--sym)"></span> <span class="lbl">Belirti</span></button>
    <button class="tab-btn" data-tab="info" onclick="switchTab('info')"><span class="tab-dot" style="background:#b7860b"></span> <span class="lbl">Bilgi</span></button>
  </nav>

  <div class="app">
    <div id="searchView">
      <div class="sec-stats" id="searchStats"></div>
      <div id="searchResults"></div>
    </div>
    <div id="mainView">
      <div class="tab-panel active" id="panel-disease">
        <button class="add-entry-btn disease" onclick="openModal('disease')"><span style="font-size:18px">+</span> Yeni hastalık ekle</button>
        <div class="sec-stats" id="stats-disease"></div>
        <div id="list-disease"></div>
      </div>
      <div class="tab-panel" id="panel-finding">
        <button class="add-entry-btn finding" onclick="openModal('finding')"><span style="font-size:18px">+</span> Yeni bulgu ekle</button>
        <div class="sec-stats" id="stats-finding"></div>
        <div id="list-finding"></div>
      </div>
      <div class="tab-panel" id="panel-symptom">
        <button class="add-entry-btn symptom" onclick="openModal('symptom')"><span style="font-size:18px">+</span> Yeni belirti ekle</button>
        <div class="sec-stats" id="stats-symptom"></div>
        <div id="list-symptom"></div>
      </div>
      <div class="tab-panel" id="panel-info">
        <button class="add-entry-btn info" onclick="openInfoModal()"><span style="font-size:18px">+</span> Yeni bilgi kartı ekle</button>
        <div class="sec-stats" id="stats-info"></div>
        <div id="list-info"></div>
      </div>
    </div>
  </div>
</div>

<!-- SINAV EKRANI -->
<div class="exam-screen" id="examScreen">
  <div class="exam-header">
    <span class="exam-header-title" id="examHeaderTitle"></span>
    <button class="exam-close-btn" onclick="closeExam()">✕ Çık</button>
  </div>
  <div class="exam-progress-bar"><div class="exam-progress-fill" id="examProgressFill" style="width:0%"></div></div>
  <div class="exam-body" id="examBody"></div>
</div>

<!-- FAB MENÜ -->
<div class="fab-menu" id="fabMenu">
  <div class="fab-item" onclick="openQuickNote()">
    <span class="fab-item-label">Hızlı not</span>
    <button class="fab-item-btn" style="background:var(--sym);">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
  </div>
</div>

<button class="fab" id="fabBtn" onclick="openQuickNote()" title="Hızlı not">
  <svg viewBox="0 0 24 24" id="fabIcon" width="22" height="22" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
</button>

<!-- İSTATİSTİK DRAWER -->
<div class="settings-panel" id="statsPanel">
  <div class="s-backdrop" onclick="closeStatsModal()"></div>
  <div class="s-drawer">
    <div class="s-head">
      <span class="s-head-title">İstatistikler</span>
      <button class="s-close" onclick="closeStatsModal()">✕</button>
    </div>
    <div class="s-body" id="statsBody"></div>
  </div>
</div>

<!-- HIZLI NOT MODALİ -->
<div class="overlay" id="quickNoteOverlay" onclick="if(event.target===this)closeQuickNote()">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header">
      <span class="modal-header-title">Hızlı Not</span>
      <button class="modal-close" onclick="closeQuickNote()">✕</button>
    </div>

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ── CONSTANTS ──
const LABELS = { disease:'Hastalık', finding:'Bulgu', symptom:'Belirti', info:'Bilgi' };
const FIELD_LABELS = { tanim:'Tanım', sorgu:'Sorgu', tetkik:'Tetkik', notlar:'Notlar' };
const FIELDS = ['tanim','sorgu','tetkik','notlar'];
const FIELD_COLORS = { tanim:'var(--text3)', sorgu:'#8e44ad', tetkik:'#d35400', notlar:'#1a7a6e' };
const STORAGE_KEY = 'medlog_local';

// ── STATE ──
let localDb = loadLocal();
let currentUser = null;
let saveTimeout = null;
let modalType = 'disease';
let modalItems = { tanim:[], sorgu:[], tetkik:[], notlar:[] };
let editingId = null;
let searchQuery = '';

// ── LOCAL STORAGE ──
function loadLocal() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || emptyDb(); }
  catch { return emptyDb(); }
}
function emptyDb() { return { disease:[], finding:[], symptom:[], info:[], pool:{ tanim:[], sorgu:[], tetkik:[], notlar:[] } }; }

function ensurePool() {
  if (!localDb.pool) localDb.pool = { tanim:[], sorgu:[], tetkik:[], notlar:[] };
  FIELDS.forEach(function(f){ if (!Array.isArray(localDb.pool[f])) localDb.pool[f] = []; });
}

// Havuzu mevcut tüm kartlardan sıfırdan oluştur (additive değil, exact)
function rebuildPoolFromEntries() {
  ensurePool();
  FIELDS.forEach(function(field) {
    var seen = new Map();
    ['disease','finding','symptom'].forEach(function(type) {
      (localDb[type]||[]).forEach(function(entry) {
        (entry[field]||[]).forEach(function(item) {
          if (item && item.trim()) seen.set(item.trim().toLowerCase(), item.trim());
        });
      });
    });
    if (field === 'notlar') {
      (localDb.info||[]).forEach(function(entry) {
        (entry.items||[]).forEach(function(item) {
          if (item && item.trim()) seen.set(item.trim().toLowerCase(), item.trim());
        });
      });
    }
    localDb.pool[field] = Array.from(seen.values());
  });
}

// addToPool kaldırıldı — rebuildPoolFromEntries() her zaman pool'u sıfırdan inşa eder,
// dolayısıyla ayrıca addToPool çağırmak gereksizdi.

function saveLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(localDb)); }

// ── FIREBASE ──
// ⚠️  GÜVENLİK NOTU: Bu yapılandırma public kaynak kodunda görünür durumdadır.
// Firebase client config'i gizlemek mümkün değildir — güvenlik tamamen
// Firestore Security Rules üzerinden sağlanmalıdır.
// Aktif kural (Firebase Console → Firestore → Rules):
//
//   rules_version = '2';
//   service cloud.firestore {
//     match /databases/{database}/documents {
//       match /users/{userId}/{document=**} {
//         allow read, write: if request.auth != null && request.auth.uid == userId;
//       }
//     }
//   }
//
// Bu kural ile yalnızca oturum açmış kullanıcı kendi verisine erişebilir. ✓
const firebaseConfig = {
  apiKey: "AIzaSyB9TXfNcr98GXJmBMluEAuu-_AEp7Skh6k",
  authDomain: "iclalcakirmedlog.firebaseapp.com",
  projectId: "iclalcakirmedlog",
  storageBucket: "iclalcakirmedlog.firebasestorage.app",
  messagingSenderId: "764365188219",
  appId: "1:764365188219:web:0d814daa98767f2ead46de",
  measurementId: "G-CRP3Z963MJ"
};

let auth, db;
try {
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();

  auth.onAuthStateChanged(async function(user) {
    if (user) {
      currentUser = user;
      try {
        await syncFromFirebase();
      } catch(e) {
        console.error('Sync on auth change failed:', e);
        showToast('⚠️ Senkronizasyon başarısız, yerel veri kullanılıyor');
      }
      updateAuthUI(true, user);
      renderAll();
    } else {
      currentUser = null;
      updateAuthUI(false, null);
    }
  });
} catch(e) { /* Firebase yüklenemedi, yerel mod aktif */ }

// ── FIRESTORE ──
function userDocRef() {
  // Path: users/{uid}/data/medlog — kuralımız users/{userId}/{document=**} ile uyumlu
  return db.collection('users').doc(currentUser.uid).collection('data').doc('medlog');
}

async function syncFromFirebase() {
  try {
    const snap = await userDocRef().get();
    if (snap.exists) {
      const remote = snap.data();
      ['disease','finding','symptom','info'].forEach(type => {
        const remoteIds = new Set((remote[type]||[]).map(e => e.id));
        const localOnly = (localDb[type]||[]).filter(e => !remoteIds.has(e.id));
        localDb[type] = [...(remote[type]||[]), ...localOnly];
      });
      // Pool merge: remote pool öncelikli, local'dekiler eklenir
      if (remote.pool) {
        FIELDS.forEach(function(f) {
          const merged = new Map();
          (remote.pool[f]||[]).forEach(function(x){ merged.set(x.toLowerCase(), x); });
          ((localDb.pool||{})[f]||[]).forEach(function(x){ if(!merged.has(x.toLowerCase())) merged.set(x.toLowerCase(), x); });
          localDb.pool[f] = Array.from(merged.values());
        });
      }
    }
    rebuildPoolFromEntries();
    await userDocRef().set(localDb);
    saveLocal();
  } catch(e) { console.error('Sync error:', e); }
}

function scheduleSave() {
  rebuildPoolFromEntries();
  setSaving(true);
  saveLocal();
  if (!currentUser || !db) { setSaving(false, true); return; }
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async function() {
    try {
      await userDocRef().set(localDb);
      setSaving(false, true);
    } catch(e) {
      console.error('Save error:', e);
      showToast('❌ Firebase kayıt hatası');
      setSaving(false, false);
    }
  }, 800);
}

function setSaving(saving, success) {
  const dot = document.getElementById('savingDot');
  if (!dot) return;
  if (saving) { dot.className = 'saving-dot saving'; }
  else if (success) { dot.className = 'saving-dot saved'; setTimeout(function(){ dot.className = 'saving-dot'; }, 2000); }
  else { dot.className = 'saving-dot'; }
}

function updateAuthUI(loggedIn, user) {
  document.getElementById('authLoggedOut').style.display = loggedIn ? 'none' : 'block';
  document.getElementById('authLoggedIn').style.display = loggedIn ? 'block' : 'none';
  if (loggedIn && user) {
    document.getElementById('authAvatar').src = user.photoURL || '';
    document.getElementById('authName').textContent = user.displayName || '';
    document.getElementById('authEmail').textContent = user.email || '';
  }
}

function signInWithGoogle() {
  if (!auth) { showToast('Firebase bağlantısı yok'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(e) { showToast('❌ Giriş başarısız'); console.error(e); });
}

function doSignOut() {
  if (!auth) return;
  auth.signOut().then(function() { showToast('👋 Çıkış yapıldı'); closeSettings(); });
}

// ── SETTINGS ──
function openSettings() {
  document.getElementById('settingsPanel').classList.add('open');
}
function closeSettings() { document.getElementById('settingsPanel').classList.remove('open'); }

// ── TAB ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab === tab); });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.toggle('active', p.id === 'panel-' + tab); });
  document.querySelectorAll('.entry-card.open').forEach(function(c){ c.classList.remove('open'); });
  if (tab === 'info') renderInfoList();
}

// ── MODAL ──
function openModal(type, entryId) {
  modalType = type;
  editingId = entryId || null;
  modalItems = { tanim:[], sorgu:[], tetkik:[], notlar:[] };
  if (entryId) {
    const entry = localDb[type].find(function(e){ return e.id === entryId; });
    if (entry) {
      document.getElementById('m-title').value = entry.title;
      FIELDS.forEach(function(f){ modalItems[f] = (entry[f]||[]).slice(); });
      document.getElementById('modalTitle').textContent = entry.title + ' — Düzenle';
    }
  } else {
    document.getElementById('m-title').value = '';
    FIELDS.forEach(function(f){ modalItems[f] = []; });
    document.getElementById('modalTitle').textContent = 'Yeni ' + LABELS[type];
  }
  document.getElementById('modalSaveBtn').className = 'btn-save ' + type;
  renderModalItems();
  updatePoolBadges();
  document.getElementById('overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('m-title').focus(); }, 100);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}

function addModalItem(field, value) {
  const inp = document.getElementById('m-' + field + '-new');
  const val = (value !== undefined ? value : inp.value).trim();
  if (!val) return;
  if (modalItems[field].some(function(x){ return x.toLowerCase() === val.toLowerCase(); })) {
    showToast('Bu madde zaten eklendi'); return;
  }
  modalItems[field].push(val);
  inp.value = '';
  acClose(field);
  renderModalItems();
  updatePoolBadges();
  inp.focus();
}

// ── AUTOCOMPLETE ──
var acFocusIdx = { tanim:-1, sorgu:-1, tetkik:-1, notlar:-1 };

function acGetSuggestions(field, query) {
  ensurePool();
  const pool = localDb.pool[field] || [];
  const q = query.toLowerCase().trim();
  const alreadyAdded = new Set(modalItems[field].map(function(x){ return x.toLowerCase(); }));
  if (!q) {
    // Boşken tüm havuzu göster (eklenmemişleri)
    return pool.filter(function(x){ return !alreadyAdded.has(x.toLowerCase()); }).slice(0, 10);
  }
  return pool.filter(function(x){
    return x.toLowerCase().includes(q) && !alreadyAdded.has(x.toLowerCase());
  }).slice(0, 10);
}

function acInput(field) {
  var inp = document.getElementById('m-' + field + '-new');
  var q = inp.value.trim();
  var suggestions = acGetSuggestions(field, q);
  acFocusIdx[field] = -1;
  renderAcDropdown(field, q, suggestions);
}

function renderAcDropdown(field, q, suggestions) {
  var dd = document.getElementById('ac-' + field);
  if (!dd) return;
  if (!suggestions.length) {
    dd.classList.remove('open');
    return;
  }
  var qRe = q ? q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') : '';
  // Öğeleri data-value attribute ile oluştur — onclick içinde string concat güvenlik riski taşır
  var html = suggestions.map(function(s, i) {
    var label = q ? esc(s).replace(new RegExp('(' + qRe + ')', 'gi'), '<mark>$1</mark>') : esc(s);
    return '<div class="ac-item" id="ac-item-' + field + '-' + i + '" data-acfield="' + esc(field) + '" data-acvalue="' + esc(s) + '">' +
      '<span class="ac-icon">&#x21A9;</span><span style="flex:1">' + label + '</span>' +
      '</div>';
  }).join('');
  if (q) {
    var alreadyInPool = (localDb.pool[field]||[]).some(function(x){ return x.toLowerCase() === q.toLowerCase(); });
    if (!alreadyInPool) {
      html += '<div class="ac-new-hint">Enter ile yeni madde ekle: <span>' + esc(q) + '</span></div>';
    }
  }
  dd.innerHTML = html;
  // Event delegation ile güvenli seçim
  dd.querySelectorAll('.ac-item').forEach(function(el) {
    el.addEventListener('mousedown', function(e) {
      e.preventDefault();
      addModalItem(el.dataset.acfield, el.dataset.acvalue);
    });
  });
  dd.classList.add('open');
}

// acSelect kaldırıldı — renderAcDropdown içinde event delegation kullanılıyor

function acClose(field) {
  var dd = document.getElementById('ac-' + field);
  if (dd) dd.classList.remove('open');
  acFocusIdx[field] = -1;
}

function acBlur(field) {
  setTimeout(function(){ acClose(field); }, 150);
}

function acKeydown(e, field) {
  var dd = document.getElementById('ac-' + field);
  var items = dd ? dd.querySelectorAll('.ac-item') : [];
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acFocusIdx[field] = Math.min(acFocusIdx[field] + 1, items.length - 1);
    acHighlight(field, items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acFocusIdx[field] = Math.max(acFocusIdx[field] - 1, -1);
    acHighlight(field, items);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (acFocusIdx[field] >= 0 && items[acFocusIdx[field]]) {
      items[acFocusIdx[field]].dispatchEvent(new MouseEvent('mousedown'));
    } else {
      addModalItem(field);
    }
  } else if (e.key === 'Escape') {
    acClose(field);
  }
}

function acHighlight(field, items) {
  items.forEach(function(el, i) {
    el.classList.toggle('focused', i === acFocusIdx[field]);
  });
}

function removeModalItem(field, idx) {

// ── SHARED INLINE EDIT HELPER ──
// Bir DOM elemanını (textEl) input'a çevirir. commit(newVal) ile değeri kaydeder.
function startInlineEdit(textEl, currentValue, borderColor, onCommit) {
  var inp = document.createElement('input');
  inp.value = currentValue;
  inp.style.cssText = 'flex:1;font-size:16px;color:var(--text);border:1.5px solid ' + borderColor + ';border-radius:6px;padding:2px 8px;font-family:Nunito,sans-serif;outline:none;width:100%;';
  textEl.replaceWith(inp);
  inp.focus(); inp.select();
  var committed = false;
  function commit() {
    if (committed) return;
    committed = true;
    var val = inp.value.trim();
    onCommit(val);
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = currentValue; inp.blur(); }
  });
}

function startEditModalItem(field, idx, el) {
  var current = modalItems[field][idx];
  startInlineEdit(el, current, 'var(--dis)', function(val) {
    if (val && val !== current) {
      var dup = modalItems[field].some(function(x,j){ return j!==idx && x.toLowerCase()===val.toLowerCase(); });
      if (dup) { showToast('Bu madde zaten var'); renderModalItems(); return; }
      modalItems[field][idx] = val;
    }
    renderModalItems();
  });
}

function editItem(type, entryId, field, idx) {
  var entry = localDb[type].find(function(e){ return e.id === entryId; });
  if (!entry || !entry[field]) return;
  var current = entry[field][idx];
  var row = document.querySelector('#card-' + entryId + ' .item-row:nth-of-type(' + (idx+1) + ')');
  // Daha güvenilir: tüm item-row'ları alıp index'e göre seç
  var container = document.getElementById('card-' + entryId);
  if (!container) return;
  var fieldSections = container.querySelectorAll('.field-section');
  var fieldIdx = FIELDS.indexOf(field);
  if (fieldIdx < 0 || !fieldSections[fieldIdx]) return;
  var rows = fieldSections[fieldIdx].querySelectorAll('.item-row');
  if (!rows[idx]) return;
  var textEl = rows[idx].querySelector('.i-text');
  if (!textEl) return;
  startInlineEdit(textEl, current, 'var(--dis)', function(val) {
    if (val && val !== current) {
      entry[field][idx] = val;
      scheduleSave();
      if (searchQuery) doSearch(searchQuery);
    }
    rerenderCard(type, entryId);
  });
}

function editInfoItem(entryId, idx) {
  var entry = (localDb.info||[]).find(function(e){ return e.id === entryId; });
  if (!entry) return;
  var current = entry.items[idx];
  var container = document.getElementById('icard-' + entryId);
  if (!container) return;
  var rows = container.querySelectorAll('.info-body-item');
  if (!rows[idx]) return;
  var textEl = rows[idx].querySelector('.info-body-text');
  if (!textEl) return;
  startInlineEdit(textEl, current, '#b7860b', function(val) {
    if (val && val !== current) {
      entry.items[idx] = val;
      scheduleSave();
    }
    renderInfoList();
  });
}

function startEditInfoModalItem(idx, el) {
  var current = infoModalItems[idx];

document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  const sv = document.getElementById('searchView'), mv = document.getElementById('mainView');
  if (searchQuery) { sv.classList.add('active'); mv.classList.add('hidden'); doSearch(searchQuery); }
  else { sv.classList.remove('active'); mv.classList.remove('hidden'); }
});

function doSearch(q) {
  const ql = q.toLowerCase(), results = [];
  ['disease','finding','symptom'].forEach(function(type) {
    localDb[type].forEach(function(entry) {
      const titleMatch = entry.title.toLowerCase().includes(ql);
      const fieldMatches = {};
      let anyMatch = false;
      FIELDS.forEach(function(f) {
        const matched = (entry[f]||[]).filter(function(i){ return i.toLowerCase().includes(ql); });
        if (matched.length) { fieldMatches[f] = matched; anyMatch = true; }
        else if (titleMatch) { fieldMatches[f] = entry[f]||[]; }
      });
      if (titleMatch || anyMatch) results.push({ type:type, entry:entry, fieldMatches:fieldMatches });
    });
  });

  document.getElementById('searchStats').innerHTML = '"<strong>' + esc(q) + '</strong>" için <strong>' + results.length + '</strong> sonuç';
  const container = document.getElementById('searchResults');
  if (!results.length) { container.innerHTML = '<div class="empty-state"><div class="ei">🔍</div><h3>Sonuç bulunamadı</h3><p>"' + esc(q) + '" ile eşleşen kayıt yok.</p></div>'; return; }

  container.innerHTML = results.map(function(r) {
    const fh = FIELDS.map(function(field) {
      const items = r.fieldMatches[field]||[];
      if (!items.length) return '';
      return '<div class="sr-field"><div class="sr-field-label ' + field + '" style="color:' + FIELD_COLORS[field] + '">' + FIELD_LABELS[field] + '</div>' +
        items.map(function(i){ return '<div class="sr-item">• ' + hl(i,q) + '</div>'; }).join('') + '</div>';
    }).join('');
    const safeType = esc(r.type);
    const safeId = esc(r.entry.id);
    return '<div class="search-result" onclick="goToCard(\'' + safeType + '\',\'' + safeId + '\')">' +
      '<div class="sr-header"><span class="sr-badge ' + safeType + '">' + LABELS[r.type] + '</span><span class="sr-title">' + hl(r.entry.title,q) + '</span><span class="sr-goto">Git →</span></div>' +
      (fh || '<div class="sr-field" style="color:var(--text3);font-size:13px;font-style:italic">Başlıkta eşleşme</div>') + '</div>';
  }).join('');
}

function goToCard(type, id) {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchView').classList.remove('active');
  document.getElementById('mainView').classList.remove('hidden');
  switchTab(type);
  // requestAnimationFrame ile DOM güncellemesinin tamamlanmasını bekle
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      const card = document.getElementById('card-' + id);
      if (!card) return;
      card.classList.add('open');
      card.scrollIntoView({ behavior:'smooth', block:'center' });
      const color = type==='disease'?'var(--dis)':type==='finding'?'var(--fin)':'var(--sym)';
      card.style.boxShadow = '0 0 0 3px ' + color;
      setTimeout(function(){ card.style.boxShadow = ''; }, 1800);
    });
  });
}

// ── EXPORT / IMPORT / CLEAR ──
function exportData() {
  const blob = new Blob([JSON.stringify(localDb, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'medlog_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  showToast('📤 Dışa aktarıldı');
  closeSettings();
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imp = JSON.parse(ev.target.result); let added = 0;
      ['disease','finding','symptom','info'].forEach(function(type) {
        if (!Array.isArray(imp[type])) return;
        var ids = new Set(localDb[type].map(function(e){ return e.id; }));
        imp[type].forEach(function(entry){
          if (!entry.id || !/^[a-zA-Z0-9_-]+$/.test(String(entry.id))) return;
          if (typeof entry.title !== 'string' || !entry.title.trim() || entry.title.trim().length > 200) return;
          if (ids.has(entry.id)) return;
          // Sadece bilinen alanları al, ham objeyi kopyalama
          var clean;
          if (type === 'info') {
            clean = { id: entry.id, title: entry.title.trim(), items: Array.isArray(entry.items) ? entry.items.filter(function(x){ return typeof x === 'string'; }).map(function(x){ return x.trim(); }).filter(Boolean) : [] };
          } else {
            clean = { id: entry.id, title: entry.title.trim() };
            FIELDS.forEach(function(f){ clean[f] = Array.isArray(entry[f]) ? entry[f].filter(function(x){ return typeof x === 'string'; }).map(function(x){ return x.trim(); }).filter(Boolean) : []; });
          }
          localDb[type].push(clean);
          added++;
        });
      });
      // Pool merge
      if (imp.pool) {
        ensurePool();
        FIELDS.forEach(function(f) {
          const existing = new Set(localDb.pool[f].map(function(x){ return x.toLowerCase(); }));
          (imp.pool[f]||[]).forEach(function(x){ if(x && !existing.has(x.toLowerCase())){ localDb.pool[f].push(x); existing.add(x.toLowerCase()); } });
        });
      }
      rebuildPoolFromEntries();
      scheduleSave(); renderAll(); closeSettings();
      showToast('✓ ' + added + ' giriş içe aktarıldı');
    } catch(err) { showToast('❌ Geçersiz dosya'); }
  };
  reader.readAsText(file); e.target.value = '';
}

function clearAllData() {
  showConfirm('Tüm veriler silinecek. Bu işlem geri alınamaz. Emin misin?', async function() {
    localDb = emptyDb();
    saveLocal();
    // Firebase belgesini de sil (boş veriyle üzerine yazmak yerine)
    if (currentUser && db) {

        console.error('Firebase silme hatası:', e);
      }
    }
    renderAll();
    closeSettings();
    showToast('🗑 Tüm veriler silindi');
  });
}

function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hl(text, q) {
  var e = esc(text);
  var qe = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return e.replace(new RegExp(qe,'gi'), function(m){ return '<mark>' + m + '</mark>'; });
}

// ── PULL TO REFRESH ──
(function(){
  var PTR_THRESHOLD = 72;
  var startY = 0, lastY = 0, pulling = false, refreshing = false;
  var ind = document.getElementById('ptr-indicator');
  var spinner = document.getElementById('ptr-spinner');
  var label = document.getElementById('ptr-label');

  // Sadece sayfanın en üstündeyken ve refresh yokken başlat
  document.addEventListener('touchstart', function(e){
    if (refreshing || window.scrollY > 0) return;
    startY = e.touches[0].clientY;
    lastY = startY;
    pulling = false; // henüz yönü bilmiyoruz
  }, { passive: true });

  document.addEventListener('touchmove', function(e){
    if (refreshing) return;
    var y = e.touches[0].clientY;
    var dist = y - startY;

    // Yukarı kaydırıyorsa PTR'yi iptal et
    if (dist <= 0) {
      if (pulling) reset();
      pulling = false;
      lastY = y;
      return;
    }

    // Sayfa scroll pozisyonu 0'dan ayrıldıysa iptal et
    if (window.scrollY > 0) {
      if (pulling) reset();
      pulling = false;
      lastY = y;
      return;
    }

    pulling = true;
    lastY = y;

    // Rubber-band damping
    var pull = Math.min(dist * 0.45, PTR_THRESHOLD * 1.15);
    var ratio = Math.min(pull / PTR_THRESHOLD, 1);

    ind.style.height = pull + 'px';
    ind.style.opacity = '1';
    ind.classList.add('pulling');
    ind.classList.remove('refreshing');
    spinner.style.transform = 'rotate(' + (ratio * 260) + 'deg)';

    if (ratio >= 1) {
      ind.classList.add('ready');
      label.textContent = 'Bırak, yenile';
    } else {
      ind.classList.remove('ready');
      label.textContent = 'Yenilemek için çek…';
    }
  }, { passive: true });

  document.addEventListener('touchend', function(){
    if (!pulling) return;
    pulling = false;

    var dist = lastY - startY;
    var pull = dist * 0.45;

    if (pull >= PTR_THRESHOLD) {
      doRefresh();
    } else {
      reset();
    }
  });

  document.addEventListener('touchcancel', function(){
    if (pulling) reset();
    pulling = false;
  });

  function doRefresh() {
    refreshing = true;
    // Inline height'ı temizle, .refreshing class'ı CSS'teki 52px'i devreye sokar
    ind.style.height = '';
    ind.style.opacity = '';
    ind.classList.remove('pulling', 'ready');
    ind.classList.add('refreshing');
    label.textContent = 'Yenileniyor…';
    spinner.style.transform = '';

    function done() {
      refreshing = false;
      ind.classList.remove('refreshing', 'pulling', 'ready');
      // Geçişi CSS transition ile yap — inline style ile çakışma olmasın
      ind.style.opacity = '0';
      setTimeout(function(){
        ind.style.height = '0';
        setTimeout(function(){
          ind.style.height = '';
          ind.style.opacity = '';
        }, 250);
      }, 150);
      rebuildPoolFromEntries();
      renderAll();
      showToast('✓ Yenilendi');
    }

    if (currentUser && db) {
      syncFromFirebase().then(done).catch(function(e){
        console.error('Pull-to-refresh sync hatası:', e);
        showToast('⚠️ Senkronizasyon başarısız');
        done();
      });
    } else {
      setTimeout(done, 600);
    }
  }

  function reset() {
    ind.classList.remove('pulling', 'ready', 'refreshing');
    ind.style.opacity = '0';
    setTimeout(function(){
      ind.style.height = '';
      ind.style.opacity = '';
    }, 200);
  }
})();

    + '<div class="s-divider"></div>'

    + statRow('Hastalık maddeleri', disItems, 'var(--dis)')
    + statRow('Bulgu maddeleri', finItems, 'var(--fin)')
    + statRow('Belirti maddeleri', symItems, 'var(--sym)')

function examCatRow(id, label, count) {
  var isDisabled = count === 0;
  var checked = !isDisabled ? 'checked' : '';
  return '<div class="exam-option-row" onclick="var cb=document.getElementById(\'' + id + '\');if(!cb.disabled){cb.checked=!cb.checked;}">' +

    '</div>';
}

function startExam() {
  var cats = [];
  if (document.getElementById('ex-dis') && document.getElementById('ex-dis').checked) cats.push('disease');
  if (document.getElementById('ex-fin') && document.getElementById('ex-fin').checked) cats.push('finding');
  if (document.getElementById('ex-sym') && document.getElementById('ex-sym').checked) cats.push('symptom');
  if (document.getElementById('ex-inf') && document.getElementById('ex-inf').checked) cats.push('info');
  if (!cats.length) { showToast('En az bir kategori seç'); return; }

  var count = parseInt(document.getElementById('ex-count').value);
  var questions = buildQuestions(cats, count);
  if (!questions.length) { showToast('Soru üretilemedi, daha fazla kart ekle'); return; }

  examState = { questions: questions, current: 0, score: 0, correct: 0, partial: 0, wrong: 0, answered: false };
  document.getElementById('examHeaderTitle').textContent = 'Sınav';
  renderExamQuestion();
}

function buildQuestions(cats, count) {
  var pool = [];
  var typeLabels = { disease:'Hastalık', finding:'Bulgu', symptom:'Belirti', info:'Bilgi Kartı' };
  var typeColors = { disease:'var(--dis)', finding:'var(--fin)', symptom:'var(--sym)', info:'#b7860b' };

  cats.forEach(function(cat) {
    var entries = (localDb[cat] || []);
    entries.forEach(function(entry) {
      var fields = cat === 'info' ? ['items'] : ['tanim','sorgu','tetkik','notlar'];
      var allItems = [];
      fields.forEach(function(f){ (entry[f]||[]).forEach(function(v){ allItems.push({field:f,val:v}); }); });
      if (!allItems.length) return;

      // Tip A: Hastalık → madde sor (çoktan seçmeli veya açık uçlu)
      if (Math.random() > 0.4) {
        // Çoktan seçmeli: hangi madde bu kartın?
        var correctItem = allItems[Math.floor(Math.random()*allItems.length)];
        // Yanlış seçenekler: diğer kartlardan
        var wrongs = [];
        var others = (localDb[cat]||[]).filter(function(e){ return e.id !== entry.id; });
        shuffle(others).slice(0,5).forEach(function(o){
          var oFields = cat==='info'?['items']:['tanim','sorgu','tetkik','notlar'];
          oFields.forEach(function(f){ (o[f]||[]).forEach(function(v){ wrongs.push(v); }); });
        });
        wrongs = shuffle(wrongs).slice(0,3);
        if (wrongs.length < 1) return;
        var choices = shuffle([correctItem.val].concat(wrongs));
        pool.push({ type:'mc-item', cat:cat, catLabel:typeLabels[cat], catColor:typeColors[cat],
          question: '"' + entry.title + '" kartına ait madde hangisidir?',
          choices: choices, correct: correctItem.val, entry: entry });
      } else {
        // Açık uçlu: kartın maddelerini yaz
        var fieldLabel = { tanim:'Tanımları', sorgu:'Sorguları', tetkik:'Tetkikleri', notlar:'Notları', items:'Maddelerini' };
        var field = fields[Math.floor(Math.random()*fields.length)];
        var items = (entry[field]||[]);
        if (!items.length) { field = 'items'; items = allItems.map(function(x){return x.val;}); }
        if (!items.length) return;
        pool.push({ type:'open', cat:cat, catLabel:typeLabels[cat], catColor:typeColors[cat],
          question: '"' + entry.title + '" kartının ' + (fieldLabel[field]||'maddelerini') + ' yaz.',
          answers: items, entry: entry });
      }

      // Tip B: Madde → hangi kart?
      if (allItems.length && cats.filter(function(c){ return (localDb[c]||[]).length>1; }).length > 0) {
        var item = allItems[Math.floor(Math.random()*allItems.length)];
        var wrongEntries = shuffle((localDb[cat]||[]).filter(function(e){ return e.id !== entry.id; })).slice(0,3);
        if (wrongEntries.length < 1) return;
        var entryChoices = shuffle([entry].concat(wrongEntries)).map(function(e){ return e.title; });
        pool.push({ type:'mc-card', cat:cat, catLabel:typeLabels[cat], catColor:typeColors[cat],
          question: '"' + item.val + '" hangi kartın maddesidir?',
          choices: entryChoices, correct: entry.title, entry: entry });
      }
    });
  });

  return shuffle(pool).slice(0, count);
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; }
  return a;
}

function renderExamQuestion() {
  var s = examState;
  var q = s.questions[s.current];
  var pct = Math.round((s.current / s.questions.length) * 100);
  document.getElementById('examProgressFill').style.width = pct + '%';
  document.getElementById('examHeaderTitle').textContent = (s.current+1) + ' / ' + s.questions.length;
  s.answered = false;

  var badgeStyle = 'background:' + (q.catColor==='var(--dis)'?'var(--dis-bg)':q.catColor==='var(--fin)'?'var(--fin-bg)':q.catColor==='var(--sym)'?'var(--sym-bg)':'#fdf6e3') + ';color:' + q.catColor;
  var metaHtml = '<div class="exam-q-meta"><span class="exam-q-num">SORU ' + (s.current+1) + '</span><span class="exam-q-badge" style="' + badgeStyle + '">' + q.catLabel + '</span></div>';
  var cardHtml = '<div class="exam-q-card"><div class="exam-q-label">Soru</div><div class="exam-q-text">' + esc(q.question) + '</div></div>';

  var answerHtml = '';
  if (q.type === 'mc-item' || q.type === 'mc-card') {
    answerHtml = '<div class="exam-choices">' +
      q.choices.map(function(c, i) {
        return '<button class="exam-choice" id="choice-'+i+'" onclick="answerMC('+i+')">' + esc(c) + '</button>';
      }).join('') +
      '</div>';
  } else {
    answerHtml = '<div class="exam-open-wrap">' +
      '<textarea class="exam-open-input" id="openAnswer" rows="4" placeholder="Bildiğin maddeleri yaz, her satıra bir madde…" onkeydown="if(event.key===\'Enter\'&&event.ctrlKey)checkOpen()"></textarea>' +
      '<div style="margin-top:8px;display:flex;gap:8px;">' +
      '<button class="exam-open-btn" onclick="checkOpen()">Kontrol Et</button>' +
      '<span style="font-size:12px;color:var(--text3);align-self:center;">Ctrl+Enter ile de gönderebilirsin</span>' +
      '</div></div>';
  }

  document.getElementById('examBody').innerHTML = metaHtml + cardHtml + answerHtml + '<div id="examFeedback"></div>';

  if (q.type === 'open') {
    setTimeout(function(){ var el=document.getElementById('openAnswer'); if(el)el.focus(); }, 100);
  }
}

function answerMC(idx) {
  if (examState.answered) return;
  examState.answered = true;
  var q = examState.questions[examState.current];
  var chosen = q.choices[idx];
  var isCorrect = chosen === q.correct;

  q.choices.forEach(function(c, i) {
    var btn = document.getElementById('choice-'+i);
    btn.disabled = true;
    if (c === q.correct) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
  });

  if (isCorrect) { examState.correct++; examState.score++; } else { examState.wrong++; }

  var fb = document.getElementById('examFeedback');
  fb.innerHTML = '<div class="exam-feedback ' + (isCorrect?'correct':'wrong') + '">' +
    '<div class="exam-feedback-title">' + (isCorrect ? '✓ Doğru!' : '✗ Yanlış') + '</div>' +
    (!isCorrect ? '<div>Doğru cevap: <strong>' + esc(q.correct) + '</strong></div>' : '') +
    '</div>' + nextBtn();
}

function checkOpen() {
  if (examState.answered) return;
  examState.answered = true;
  var q = examState.questions[examState.current];
  var raw = (document.getElementById('openAnswer').value || '').trim();
  var userAnswers = raw.split('\n').map(function(s){ return s.trim().toLowerCase(); }).filter(Boolean);
  var correct = q.answers.map(function(a){ return a.toLowerCase(); });

  var hits = correct.filter(function(a){ return userAnswers.some(function(u){ return u.length>2 && (a.includes(u)||u.includes(a)); }); });
  var misses = q.answers.filter(function(a){ return !hits.includes(a.toLowerCase()); });
  var ratio = hits.length / correct.length;

  var cls, label;
  if (ratio >= 0.8) { cls='correct'; label='✓ Harika!'; examState.correct++; examState.score += ratio; }
  else if (ratio >= 0.4) { cls='partial'; label='~ Kısmen doğru'; examState.partial++; examState.score += ratio * 0.5; }
  else { cls='wrong'; label='✗ Eksik kaldı'; examState.wrong++; }

  var chipsHtml = '<div class="exam-feedback-items">' +
    hits.map(function(h){ return '<span class="exam-feedback-chip hit">✓ ' + esc(q.answers.find(function(a){return a.toLowerCase()===h;})||h) + '</span>'; }).join('') +
    misses.map(function(m){ return '<span class="exam-feedback-chip miss">✗ ' + esc(m) + '</span>'; }).join('') +
    '</div>';

  document.getElementById('examFeedback').innerHTML =
    '<div class="exam-feedback ' + cls + '">' +
    '<div class="exam-feedback-title">' + label + ' (' + hits.length + '/' + correct.length + ')</div>' +
    chipsHtml +
    '</div>' + nextBtn();
}

function nextBtn() {
  var isLast = examState.current >= examState.questions.length - 1;
  return '<button class="exam-next-btn" onclick="' + (isLast?'showExamResult()':'nextQuestion()') + '">' + (isLast?'Sonucu Gör →':'Sonraki Soru →') + '</button>';
}

function nextQuestion() {
  examState.current++;
  renderExamQuestion();
}

function showExamResult() {
  var s = examState;
  document.getElementById('examProgressFill').style.width = '100%';
  document.getElementById('examHeaderTitle').textContent = 'Sonuç';
  var total = s.questions.length;
  var pct = Math.round((s.score / total) * 100);
  var emoji = pct>=80?'🎉':pct>=50?'👍':'💪';

  document.getElementById('examBody').innerHTML =
    '<div class="exam-result">' +
    '<div style="font-size:48px;margin-bottom:-8px;">' + emoji + '</div>' +
    '<div class="exam-result-score">' + pct + '%</div>' +
    '<div class="exam-result-label">' + total + ' sorudan ' + s.correct + ' tam doğru</div>' +
    '<div class="exam-result-detail">' +
      '<div class="exam-result-row"><span>✓ Tam doğru</span><span style="color:#27ae60;font-weight:800;">' + s.correct + '</span></div>' +
      '<div class="exam-result-row"><span>~ Kısmen doğru</span><span style="color:#b7860b;font-weight:800;">' + s.partial + '</span></div>' +
      '<div class="exam-result-row"><span>✗ Yanlış / Eksik</span><span style="color:var(--dis);font-weight:800;">' + s.wrong + '</span></div>' +
      '<div class="exam-result-row"><span>Toplam soru</span><span style="font-weight:800;">' + total + '</span></div>' +
    '</div>' +
    '<button class="exam-result-restart" onclick="renderExamStart()">Tekrar Başlat</button>' +
    '<button class="exam-result-back" onclick="closeExam()">Ana Ekrana Dön</button>' +
    '</div>';
}

// ── INIT ──
ensurePool();
rebuildPoolFromEntries();
renderAll();
switchTab('disease');
</script>
</body>
</html>
